<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leaderboard — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--navy-light:#1e3f6e;--charcoal:#1C1C1E;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;
      --gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;
      --border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--amber:#D97706;
      --sidebar-w:252px;--topbar-h:62px;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --shadow-md:0 4px 20px rgba(11,31,58,.10);
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:var(--font-body);border:none;background:none}svg{display:block}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--navy);display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none;flex-shrink:0}
    .sb-logo-mark{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .sb-logo-name{font-family:var(--font-display);font-size:16px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:block}
    .sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
    .sb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.24);padding:12px 10px 4px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.56);transition:all .15s;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:17px;flex-shrink:0;display:flex;align-items:center}
    .sb-user{padding:11px 13px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .sb-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:rgba(255,255,255,.32)}
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);z-index:99;backdrop-filter:blur(2px)}
    .sb-ov.show{display:block}
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,26px);gap:12px;box-shadow:0 1px 4px rgba(11,31,58,.06)}
    .topbar-ham{display:none;flex-direction:column;gap:4px;padding:4px;flex-shrink:0}
    @media(max-width:960px){.topbar-ham{display:flex}}
    .topbar-ham span{display:block;width:19px;height:1.8px;background:var(--navy);border-radius:2px}
    .topbar-ttl{font-family:var(--font-display);font-size:17px;color:var(--navy)}
    .topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-decoration:none}
    .page{padding:clamp(16px,3vw,26px);flex:1}
    .skel{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* TABS */
    .tabs{display:flex;gap:0;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:4px;margin-bottom:20px;flex-wrap:wrap;gap:4px}
    .tab{flex:1;padding:10px 14px;border-radius:var(--r-md);font-size:13px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:all .15s;text-align:center;white-space:nowrap;min-width:100px}
    .tab:hover{color:var(--navy)}
    .tab.active{background:var(--navy);color:#fff}

    /* FILTERS */
    .filters{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .filter-btn{padding:6px 14px;border-radius:var(--r-full);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:var(--navy);color:var(--navy)}
    .filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .filter-select{padding:6px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--white);color:var(--gray-800);cursor:pointer;outline:none;font-family:var(--font-body)}
    .filter-select:focus{border-color:var(--navy)}

    /* LEADERBOARD TABLE */
    .lb-panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
    .lb-header{display:grid;padding:10px 20px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400)}
    .lb-row{display:grid;padding:13px 20px;border-bottom:1px solid var(--border);transition:background .15s;align-items:center}
    .lb-row:last-child{border-bottom:none}
    .lb-row:hover{background:var(--gray-50)}
    .lb-row.you{background:rgba(11,31,58,.04);border-left:3px solid var(--navy)}
    .lb-row.you:hover{background:rgba(11,31,58,.06)}
    .lb-rank{font-family:var(--font-display);font-size:18px;color:var(--navy);min-width:36px}
    .lb-rank.gold{color:var(--gold-deep)}
    .lb-rank.silver{color:#6B7280}
    .lb-rank.bronze{color:#92400e}
    .lb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
    .lb-av.you-av{background:linear-gradient(135deg,var(--navy),var(--navy-light))}
    .lb-name{font-size:14px;font-weight:600;color:var(--navy)}
    .lb-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
    .lb-you-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:var(--r-full);background:var(--navy);color:#fff;margin-left:6px;vertical-align:middle}
    .lb-pts{font-family:var(--font-display);font-size:16px;color:var(--navy);text-align:right}
    .lb-pts-lbl{font-size:10px;color:var(--gray-400);text-align:right;margin-top:1px}
    .lb-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:var(--r-full)}
    .lb-empty{padding:48px 20px;text-align:center;font-size:14px;color:var(--gray-400);line-height:1.6}
    .lb-divider{padding:8px 20px;background:var(--gray-50);border-bottom:1px solid var(--border);font-size:11px;color:var(--gray-400);font-weight:600;text-align:center}

    /* YOUR POSITION CARD */
    .your-pos{background:var(--navy);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .your-pos-l{display:flex;align-items:center;gap:12px}
    .your-pos-rank{font-family:var(--font-display);font-size:32px;color:#fff;line-height:1}
    .your-pos-lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
    .your-pos-name{font-size:14px;font-weight:600;color:#fff}
    .your-pos-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
    .your-pos-pts{text-align:right}
    .your-pos-pts-num{font-family:var(--font-display);font-size:22px;color:var(--gold-bright);line-height:1}
    .your-pos-pts-lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px}

    /* STUDY HALL TAB */
    .hall-info{background:var(--white);border:1.5px solid var(--gold);border-radius:var(--r-lg);padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .hall-info-name{font-family:var(--font-display);font-size:20px;color:var(--navy)}
    .hall-info-sub{font-size:12px;color:var(--gray-600);margin-top:3px}
    .hall-info-right{text-align:right}
    .hall-days{font-size:13px;font-weight:600;color:var(--navy)}
    .hall-days-lbl{font-size:11px;color:var(--gray-400);margin-top:2px}
    .hall-zones{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap}
    .hall-zone-pill{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 12px;border-radius:var(--r-full)}
    .hall-zone-pill.promote{background:var(--green-pale);color:var(--green)}
    .hall-zone-pill.relegate{background:rgba(220,38,38,.08);color:var(--red)}
    .hall-zone-pill.neutral{background:var(--gray-100);color:var(--gray-600)}
    .hall-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .hall-dot.promote{background:var(--gold)}
    .hall-dot.relegate{background:var(--red)}
    .hall-dot.neutral{background:var(--gray-300)}

    /* HALL TABLE */
    .hall-table{width:100%;border-collapse:collapse}
    .hall-th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);padding:10px 20px;text-align:left;border-bottom:1px solid var(--border)}
    .hall-th:last-child{text-align:right}
    .hall-tr{border-bottom:1px solid var(--border);transition:background .15s}
    .hall-tr:last-child{border-bottom:none}
    .hall-tr:hover{background:var(--gray-50)}
    .hall-tr.you{background:rgba(11,31,58,.04)}
    .hall-tr.promote-zone{border-left:3px solid var(--gold)}
    .hall-tr.relegate-zone{border-left:3px solid var(--red)}
    .hall-td{padding:12px 20px;font-size:13px}
    .hall-pos-num{font-weight:700;color:var(--navy);width:28px}
    .hall-member-name{font-weight:600;color:var(--navy)}
    .hall-member-you{font-size:9px;font-weight:700;padding:1px 6px;border-radius:var(--r-full);background:var(--navy);color:#fff;margin-left:6px}
    .hall-pts-val{text-align:right;font-weight:700;font-family:var(--font-display);font-size:15px;color:var(--navy)}
    .hall-not-placed{padding:40px 20px;text-align:center;color:var(--gray-400);font-size:14px;line-height:1.7}

    /* RANK BADGES */
    .rank-freshman{background:var(--gray-100);color:var(--gray-600)}
    .rank-scholar{background:#fef3c7;color:#92400e}
    .rank-achiever{background:#fef3c7;color:#92400e}
    .rank-honours{background:#e0e7ff;color:#3730a3}
    .rank-merit{background:var(--gold-pale);color:var(--gold-deep)}
    .rank-distinction{background:var(--gold-pale);color:var(--gold-deep)}
    .rank-excellence{background:#f0fdf4;color:#166534}
    .rank-valedictorian{background:#f0fdf4;color:#166534}
    .rank-summa{background:var(--navy);color:#fff}
    .rank-legend{background:linear-gradient(135deg,var(--navy),var(--gold-deep));color:#fff}

    /* BATTLE RANK BADGES */
    .br-recruit{background:var(--gray-100);color:var(--gray-600)}
    .br-challenger{background:#fef3c7;color:#92400e}
    .br-competitor{background:#e0e7ff;color:#3730a3}
    .br-contender{background:var(--gold-pale);color:var(--gold-deep)}
    .br-elite{background:var(--green-pale);color:var(--green)}
    .br-champion{background:linear-gradient(135deg,var(--navy),var(--gold-deep));color:#fff}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:var(--charcoal);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;max-width:380px;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  </style>
  <script src="/js/api.js"></script>
</head>

    <button class="topbar-ham" id="hamBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    <div class="topbar-ttl">Leaderboard</div>
    <div class="topbar-r"><a href="profile.html" class="topbar-av" id="topAv">--</a></div>
  </header>

  <main class="page">
    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('hall')">Study Hall</div>
      <div class="tab" onclick="switchTab('academic')">Academic Rank</div>
      <div class="tab" onclick="switchTab('battle')">Battle Board</div>
      <div class="tab" onclick="switchTab('subject')">Subject Board</div>
    </div>

    <!-- TAB CONTENT -->
    <div id="tabContent">
      <div class="lb-empty">Loading...</div>
    </div>
  </main>
</div>

<script>
let PX_USER = null;
let currentTab = 'hall';
let academicPeriod = 'alltime';
let academicFocus = 'all';
let battlePeriod = 'alltime';
let selectedSubject = '';

(async () => {
  try {
    const data = await PX.get('/auth/me');
    if (!data || !data.user) { window.location.href = '/login.html'; return; }
    PX_USER = data.user;
    if (!PX_USER.profileComplete) { window.location.href = '/profile-setup.html'; return; }
    initUser();
    switchTab('hall');
  } catch(e) { window.location.href = '/login.html'; }
})();

function initUser() {
  const u = PX_USER;
  const initials = ((u.firstName||'')[0]+(u.lastName||'')[0]).toUpperCase()||'--';
  document.querySelectorAll('.sb-av,#sbAv,#topAv').forEach(el => el.textContent = initials);
  document.getElementById('sbUname').textContent = (u.firstName+' '+u.lastName).trim();
  document.getElementById('sbRole').textContent = (u.examFocus==='oau'?'OAU':'UNILAG')+' Post-UTME · 2026';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['hall','academic','battle','subject'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  const content = document.getElementById('tabContent');
  content.innerHTML = '<div class="lb-empty"><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px"></div></div>';

  if (tab === 'hall') loadHallTab();
  else if (tab === 'academic') loadAcademicTab();
  else if (tab === 'battle') loadBattleTab();
  else if (tab === 'subject') loadSubjectTab();
}

/* ═══════════════════════════════════
   TAB 1 — STUDY HALL
═══════════════════════════════════ */
async function loadHallTab() {
  try {
    const data = await PX.get('/study-hall');
    renderHallTab(data);
  } catch(e) {
    document.getElementById('tabContent').innerHTML = '<div class="lb-empty">Failed to load Study Hall data.</div>';
  }
}

function renderHallTab(data) {
  const content = document.getElementById('tabContent');
  if (!data || !data.standings || data.standings.length === 0) {
    content.innerHTML = `
      <div class="lb-panel">
        <div class="hall-not-placed">
          <div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:8px">You are not in a Study Hall yet</div>
          <div>Complete at least one exam session to be placed in a Study Hall.<br>You will compete with students at a similar level.</div>
          <div style="margin-top:16px"><a href="flash-cbt.html" style="display:inline-block;padding:10px 20px;background:var(--navy);color:#fff;border-radius:var(--r-sm);font-size:14px;font-weight:600">Start Flash CBT</a></div>
        </div>
      </div>`;
    return;
  }

  const days = data.daysRemaining || 0;
  const hallName = data.hallName || 'Preparatory';
  const myPos = data.myPosition;

  let html = `
    <div class="hall-info">
      <div>
        <div class="hall-info-name">${hallName}</div>
        <div class="hall-info-sub">Your group this week · ${data.standings.length} members</div>
      </div>
      <div class="hall-info-right">
        <div class="hall-days">${days} day${days!==1?'s':''} remaining</div>
        <div class="hall-days-lbl">Week ends Sunday</div>
      </div>
    </div>
    <div class="hall-zones">
      <div class="hall-zone-pill promote"><div class="hall-dot promote"></div>Positions 1–4: Promoted next week</div>
      <div class="hall-zone-pill relegate"><div class="hall-dot relegate"></div>Positions 17–20: Relegated</div>
      <div class="hall-zone-pill neutral"><div class="hall-dot neutral"></div>Positions 5–16: Stay</div>
    </div>
    <div class="lb-panel">
      <table class="hall-table">
        <thead><tr>
          <th class="hall-th" style="width:40px">#</th>
          <th class="hall-th">Student</th>
          <th class="hall-th" style="text-align:right">SP This Week</th>
        </tr></thead>
        <tbody>`;

  data.standings.forEach((s, i) => {
    const pos = s.position || (i+1);
    const isPromote = pos <= 4;
    const isRelegate = pos >= (data.standings.length - 3);
    const isYou = s.isCurrentUser;
    let rowClass = 'hall-tr';
    if (isYou) rowClass += ' you';
    if (isPromote) rowClass += ' promote-zone';
    else if (isRelegate) rowClass += ' relegate-zone';

    html += `<tr class="${rowClass}">
      <td class="hall-td hall-pos-num">${pos}</td>
      <td class="hall-td">
        <div class="hall-member-name">${s.name}${isYou?'<span class="hall-member-you">You</span>':''}</div>
      </td>
      <td class="hall-td hall-pts-val">${(s.points||0).toLocaleString()}</td>
    </tr>`;
  });

  html += `</tbody></table>
    <div style="padding:12px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--gray-400);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>Top 4 promoted Sunday night</span>
      ${myPos ? `<span>Your position: <strong style="color:var(--navy)">#${myPos}</strong></span>` : ''}
    </div>
  </div>`;

  content.innerHTML = html;
}

/* ═══════════════════════════════════
   TAB 2 — ACADEMIC RANK
═══════════════════════════════════ */
async function loadAcademicTab() {
  const content = document.getElementById('tabContent');
  content.innerHTML = `
    <div class="filters">
      <div style="font-size:12px;font-weight:600;color:var(--gray-600)">Period:</div>
      <button class="filter-btn ${academicPeriod==='weekly'?'active':''}" onclick="setAcademicPeriod('weekly')">This Week</button>
      <button class="filter-btn ${academicPeriod==='monthly'?'active':''}" onclick="setAcademicPeriod('monthly')">This Month</button>
      <button class="filter-btn ${academicPeriod==='alltime'?'active':''}" onclick="setAcademicPeriod('alltime')">All Time</button>
      <div style="margin-left:8px;font-size:12px;font-weight:600;color:var(--gray-600)">Focus:</div>
      <button class="filter-btn ${academicFocus==='all'?'active':''}" onclick="setAcademicFocus('all')">All</button>
      <button class="filter-btn ${academicFocus==='unilag'?'active':''}" onclick="setAcademicFocus('unilag')">UNILAG</button>
      <button class="filter-btn ${academicFocus==='oau'?'active':''}" onclick="setAcademicFocus('oau')">OAU</button>
    </div>
    <div id="academicList"><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px"></div></div>`;

  try {
    const data = await PX.get('/leaderboard/academic?period='+academicPeriod+'&examFocus='+academicFocus+'&limit=100');
    renderAcademicList(data);
  } catch(e) {
    document.getElementById('academicList').innerHTML = '<div class="lb-empty">Failed to load rankings. Complete exams to earn points and appear here.</div>';
  }
}

function setAcademicPeriod(p) { academicPeriod = p; loadAcademicTab(); }
function setAcademicFocus(f) { academicFocus = f; loadAcademicTab(); }

function renderAcademicList(data) {
  const el = document.getElementById('academicList');
  if (!el) return;
  const entries = (data && data.entries) || [];
  const currentUser = data && data.currentUser;
  const ptsKey = academicPeriod === 'weekly' ? 'weekPoints' : academicPeriod === 'monthly' ? 'monthPoints' : 'totalPoints';
  const ptsLabel = academicPeriod === 'weekly' ? 'SP this week' : academicPeriod === 'monthly' ? 'pts this month' : 'total pts';

  if (entries.length === 0) {
    el.innerHTML = '<div class="lb-panel"><div class="lb-empty">No rankings yet. Complete exams to earn points and appear here.</div></div>';
    return;
  }

  let html = '';

  // Current user position card if not in top list
  if (currentUser && !entries.find(e => e.isCurrentUser)) {
    html += `<div class="your-pos">
      <div class="your-pos-l">
        <div><div class="your-pos-rank">#${currentUser.rank}</div><div class="your-pos-lbl">Your position</div></div>
        <div><div class="your-pos-name">${currentUser.name} <span style="font-size:10px;background:rgba(255,255,255,.15);padding:1px 6px;border-radius:9999px">You</span></div>
        <div class="your-pos-sub">${currentUser.academicRank || 'Freshman'}</div></div>
      </div>
      <div class="your-pos-pts">
        <div class="your-pos-pts-num">${(currentUser[ptsKey]||currentUser.totalPoints||0).toLocaleString()}</div>
        <div class="your-pos-pts-lbl">${ptsLabel}</div>
      </div>
    </div>`;
  }

  html += `<div class="lb-panel">`;

  entries.forEach((e, i) => {
    const rankColors = ['gold','silver','bronze'];
    const rankColor = rankColors[i] || '';
    const rankClass = 'rank-'+(e.academicRank||'freshman').toLowerCase();
    const pts = e[ptsKey] || e.totalPoints || 0;

    html += `<div class="lb-row ${e.isCurrentUser?'you':''}" style="grid-template-columns:44px 32px 1fr auto">
      <div class="lb-rank ${rankColor}">#${e.rank}</div>
      <div class="lb-av ${e.isCurrentUser?'you-av':''}">${(e.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="lb-name">${e.name}${e.isCurrentUser?'<span class="lb-you-badge">You</span>':''}</div>
        <div class="lb-sub">${e.examFocus?e.examFocus.toUpperCase()+' · ':''}<span class="lb-badge ${rankClass}">${e.academicRank||'Freshman'}</span></div>
      </div>
      <div>
        <div class="lb-pts">${pts.toLocaleString()}</div>
        <div class="lb-pts-lbl">${ptsLabel}</div>
      </div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════
   TAB 3 — BATTLE BOARD
═══════════════════════════════════ */
async function loadBattleTab() {
  const content = document.getElementById('tabContent');
  content.innerHTML = `
    <div class="filters">
      <div style="font-size:12px;font-weight:600;color:var(--gray-600)">Period:</div>
      <button class="filter-btn ${battlePeriod==='weekly'?'active':''}" onclick="setBattlePeriod('weekly')">This Week</button>
      <button class="filter-btn ${battlePeriod==='monthly'?'active':''}" onclick="setBattlePeriod('monthly')">This Month</button>
      <button class="filter-btn ${battlePeriod==='alltime'?'active':''}" onclick="setBattlePeriod('alltime')">All Time</button>
    </div>
    <div id="battleList"><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px"></div></div>`;

  try {
    const data = await PX.get('/leaderboard/battle?period='+battlePeriod+'&limit=100');
    renderBattleList(data);
  } catch(e) {
    document.getElementById('battleList').innerHTML = '<div class="lb-empty">Failed to load battle rankings.</div>';
  }
}

function setBattlePeriod(p) { battlePeriod = p; loadBattleTab(); }

function renderBattleList(data) {
  const el = document.getElementById('battleList');
  if (!el) return;
  const entries = (data && data.entries) || [];
  const currentUser = data && data.currentUser;

  if (entries.length === 0) {
    el.innerHTML = '<div class="lb-panel"><div class="lb-empty">No battle rankings yet. Challenge someone to a battle to earn Battle Points.</div></div>';
    return;
  }

  let html = '';

  if (currentUser && !entries.find(e => e.isCurrentUser)) {
    html += `<div class="your-pos">
      <div class="your-pos-l">
        <div><div class="your-pos-rank">#${currentUser.rank}</div><div class="your-pos-lbl">Your position</div></div>
        <div><div class="your-pos-name">${currentUser.name}</div><div class="your-pos-sub">${currentUser.battleRank||'Recruit'}</div></div>
      </div>
      <div class="your-pos-pts">
        <div class="your-pos-pts-num">${(currentUser.totalBattlePoints||0).toLocaleString()}</div>
        <div class="your-pos-pts-lbl">Battle Points</div>
      </div>
    </div>`;
  }

  html += '<div class="lb-panel">';

  entries.forEach((e, i) => {
    const rankColors = ['gold','silver','bronze'];
    const rankColor = rankColors[i] || '';
    const brClass = 'br-'+(e.battleRank||'recruit').toLowerCase();
    const wr = e.winRate ? Math.round(e.winRate) : 0;

    html += `<div class="lb-row ${e.isCurrentUser?'you':''}" style="grid-template-columns:44px 32px 1fr auto">
      <div class="lb-rank ${rankColor}">#${e.rank}</div>
      <div class="lb-av ${e.isCurrentUser?'you-av':''}">${(e.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="lb-name">${e.name}${e.isCurrentUser?'<span class="lb-you-badge">You</span>':''}</div>
        <div class="lb-sub"><span class="lb-badge ${brClass}">${e.battleRank||'Recruit'}</span> · W:${e.wins||0} L:${e.losses||0} D:${e.draws||0} · ${wr}% win rate</div>
      </div>
      <div>
        <div class="lb-pts">${(e.totalBattlePoints||0).toLocaleString()}</div>
        <div class="lb-pts-lbl">Battle Points</div>
      </div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

/* ═══════════════════════════════════
   TAB 4 — SUBJECT BOARD
═══════════════════════════════════ */
function loadSubjectTab() {
  const subjects = (PX_USER.selectedSubjects || []);
  if (!selectedSubject && subjects.length > 0) selectedSubject = subjects[0];

  const content = document.getElementById('tabContent');
  content.innerHTML = `
    <div class="filters" style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--gray-600)">Subject:</div>
      <select class="filter-select" id="subjectSelect" onchange="changeSubject(this.value)">
        ${subjects.map(s => `<option value="${s}" ${s===selectedSubject?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div id="subjectList"><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px"></div></div>`;

  if (selectedSubject) fetchSubjectBoard(selectedSubject);
}

function changeSubject(subj) {
  selectedSubject = subj;
  fetchSubjectBoard(subj);
}

async function fetchSubjectBoard(subject) {
  const el = document.getElementById('subjectList');
  if (el) el.innerHTML = '<div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px;margin-bottom:8px"></div><div class="skel" style="height:60px"></div>';
  try {
    const data = await PX.get('/leaderboard/subject?subject='+encodeURIComponent(subject)+'&limit=50');
    renderSubjectBoard(data);
  } catch(e) {
    if (el) el.innerHTML = '<div class="lb-empty">Failed to load subject rankings.</div>';
  }
}

function renderSubjectBoard(data) {
  const el = document.getElementById('subjectList');
  if (!el) return;
  const entries = (data && data.entries) || [];
  const currentUser = data && data.currentUser;

  if (entries.length === 0) {
    el.innerHTML = '<div class="lb-panel"><div class="lb-empty">No rankings for this subject yet. Complete Topic Drill or Flash CBT sessions to appear here.</div></div>';
    return;
  }

  let html = '';

  if (currentUser && !entries.find(e => e.isCurrentUser)) {
    html += `<div class="your-pos">
      <div class="your-pos-l">
        <div><div class="your-pos-rank">#${currentUser.rank}</div><div class="your-pos-lbl">Your position</div></div>
        <div><div class="your-pos-name">${currentUser.name}</div><div class="your-pos-sub">${currentUser.sessionCount} session${currentUser.sessionCount!==1?'s':''}</div></div>
      </div>
      <div class="your-pos-pts">
        <div class="your-pos-pts-num">${Math.round(currentUser.avgScore||0)}%</div>
        <div class="your-pos-pts-lbl">avg score</div>
      </div>
    </div>`;
  }

  html += '<div class="lb-panel">';

  entries.forEach((e, i) => {
    const rankColors = ['gold','silver','bronze'];
    const rankColor = rankColors[i] || '';
    const score = Math.round(e.avgScore || 0);
    const scoreColor = score >= 80 ? 'var(--green)' : score >= 60 ? 'var(--amber)' : 'var(--red)';

    html += `<div class="lb-row ${e.isCurrentUser?'you':''}" style="grid-template-columns:44px 32px 1fr auto">
      <div class="lb-rank ${rankColor}">#${e.rank}</div>
      <div class="lb-av ${e.isCurrentUser?'you-av':''}">${(e.name||'?')[0].toUpperCase()}</div>
      <div>
        <div class="lb-name">${e.name}${e.isCurrentUser?'<span class="lb-you-badge">You</span>':''}</div>
        <div class="lb-sub">${e.examFocus?e.examFocus.toUpperCase()+' · ':''} ${e.sessionCount} session${e.sessionCount!==1?'s':''}</div>
      </div>
      <div>
        <div class="lb-pts" style="color:${scoreColor}">${score}%</div>
        <div class="lb-pts-lbl">avg score</div>
      </div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

/* SIDEBAR + UTILS */
let toastTimer;
function showToast(msg) { const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3500); }
const sb=document.getElementById('sidebar'),ov=document.getElementById('sbOv'),ham=document.getElementById('hamBtn');
function closeSidebar(){sb.classList.remove('open');ov.classList.remove('show');ham.setAttribute('aria-expanded','false');document.body.style.overflow='';}
function openSidebar(){sb.classList.add('open');ov.classList.add('show');ham.setAttribute('aria-expanded','true');document.body.style.overflow='hidden';}
ham.addEventListener('click',()=>sb.classList.contains('open')?closeSidebar():openSidebar());
ov.addEventListener('click',closeSidebar);
</script>
</body>
</html>
