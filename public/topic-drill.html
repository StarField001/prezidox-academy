<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Topic Drill — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--navy-light:#1e3f6e;--charcoal:#1C1C1E;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;
      --gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;
      --border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--amber:#D97706;
      --sidebar-w:252px;--topbar-h:62px;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --shadow-md:0 4px 20px rgba(11,31,58,.10);
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
    svg{display:block}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--navy);display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none;flex-shrink:0}
    .sb-logo-mark{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .sb-logo-name{font-family:var(--font-display);font-size:16px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:block}
    .sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
    .sb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.24);padding:12px 10px 4px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.56);transition:all .15s;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:17px;flex-shrink:0;display:flex;align-items:center}
    .sb-user{padding:11px 13px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .sb-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:rgba(255,255,255,.32)}
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);z-index:99;backdrop-filter:blur(2px)}
    .sb-ov.show{display:block}
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,26px);gap:12px;box-shadow:0 1px 4px rgba(11,31,58,.06)}
    .topbar-ham{display:none;flex-direction:column;gap:4px;padding:4px;flex-shrink:0}
    @media(max-width:960px){.topbar-ham{display:flex}}
    .topbar-ham span{display:block;width:19px;height:1.8px;background:var(--navy);border-radius:2px}
    .topbar-ttl{font-family:var(--font-display);font-size:17px;color:var(--navy)}
    .topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-decoration:none}
    .page{padding:clamp(16px,3vw,26px);flex:1;max-width:680px}
    .back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--navy);padding:7px 0;margin-bottom:16px;cursor:pointer;background:none;border:none}
    .back-btn:hover{color:var(--gold-deep)}
    .page-heading{font-family:var(--font-display);font-size:24px;color:var(--navy);margin-bottom:4px}
    .page-subheading{font-size:14px;color:var(--gray-600);margin-bottom:24px}
    .skel{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* SUBJECT GRID */
    .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .subj-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .2s}
    .subj-card:hover{border-color:var(--navy);box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .subj-card-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px}
    .subj-card-bar-wrap{height:4px;background:var(--gray-100);border-radius:9999px;overflow:hidden;margin-bottom:8px}
    .subj-card-bar-fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,var(--green),#4ade80)}
    .subj-card-meta{display:flex;align-items:center;justify-content:space-between}
    .subj-mastery-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:9999px}
    .smb-not-started,.smb-attempted{background:var(--gray-100);color:var(--gray-600)}
    .smb-learning{background:#EFF6FF;color:#2563eb}
    .smb-improving{background:rgba(217,119,6,.1);color:var(--amber)}
    .smb-mastered{background:var(--green-pale);color:var(--green)}
    .smb-expert{background:var(--gold-pale);color:var(--gold-deep)}

    /* TOPIC LIST */
    .topic-list{display:flex;flex-direction:column;gap:8px}
    .topic-row{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:14px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
    .topic-row:hover{border-color:var(--navy);background:rgba(11,31,58,.02)}
    .topic-info{flex:1;min-width:0}
    .topic-name{font-size:14px;font-weight:600;color:var(--navy)}
    .topic-meta{font-size:11px;color:var(--gray-400);margin-top:3px}
    .topic-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .topic-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:9999px;background:var(--gray-100);color:var(--gray-600)}
    .topic-arr{color:var(--gray-300)}

    /* DRILL SCREEN */
    .drill-progress{background:var(--gray-100);height:4px;border-radius:9999px;overflow:hidden;margin-bottom:20px}
    .drill-progress-fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,var(--navy),var(--navy-light));transition:width .4s ease}
    .q-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:24px;margin-bottom:16px}
    .q-meta{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:12px}
    .q-text{font-size:15px;color:var(--navy);line-height:1.7;margin-bottom:20px;font-weight:500}
    .options{display:flex;flex-direction:column;gap:10px}
    .option{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r-md);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
    .option:hover:not(.locked){border-color:var(--navy);background:rgba(11,31,58,.02)}
    .option.selected{border-color:var(--navy);background:rgba(11,31,58,.06)}
    .option.correct{border-color:var(--green);background:var(--green-pale)}
    .option.wrong{border-color:var(--red);background:#FEF2F2}
    .option.locked{cursor:default}
    .opt-key{width:28px;height:28px;border-radius:8px;background:var(--gray-100);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray-600);flex-shrink:0;transition:all .15s}
    .option.selected .opt-key{background:var(--navy);color:#fff;border-color:var(--navy)}
    .option.correct .opt-key{background:var(--green);color:#fff;border-color:var(--green)}
    .option.wrong .opt-key{background:var(--red);color:#fff;border-color:var(--red)}
    .opt-text{font-size:14px;color:var(--gray-800);line-height:1.5}
    .option.correct .opt-text{color:var(--green);font-weight:600}
    .option.wrong .opt-text{color:var(--red)}
    .feedback-box{border-radius:var(--r-md);padding:14px 16px;margin-top:16px;animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .feedback-box.correct{background:var(--green-pale);border:1px solid rgba(24,163,74,.2)}
    .feedback-box.wrong{background:#FEF2F2;border:1px solid rgba(220,38,38,.2)}
    .feedback-label{font-size:13px;font-weight:700;margin-bottom:4px}
    .feedback-box.correct .feedback-label{color:var(--green)}
    .feedback-box.wrong .feedback-label{color:var(--red)}
    .correct-answer-text{font-size:12px;color:var(--gray-600);margin-top:4px}
    .explanation-card{background:var(--gray-50);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:var(--r-md);padding:14px 16px;margin-top:12px}
    .expl-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);margin-bottom:6px}
    .expl-body{font-size:13px;color:var(--gray-800);line-height:1.65}
    .next-btn{width:100%;padding:13px;border-radius:var(--r-sm);background:var(--navy);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:16px;transition:background .15s}
    .next-btn:hover{background:var(--navy-mid)}

    /* DRILL COMPLETE */
    .drill-complete{background:var(--white);border:1.5px solid var(--border);border-radius:18px;padding:32px;text-align:center}
    .dc-score{font-family:var(--font-display);font-size:52px;color:var(--navy);line-height:1;margin-bottom:8px}
    .dc-sub{font-size:14px;color:var(--gray-600);margin-bottom:20px}
    .dc-mastery{font-size:15px;font-weight:700;padding:8px 20px;border-radius:9999px;display:inline-block;margin-bottom:24px}
    .dc-mastery.green{background:var(--green-pale);color:var(--green)}
    .dc-mastery.amber{background:rgba(217,119,6,.1);color:var(--amber)}
    .dc-mastery.gray{background:var(--gray-100);color:var(--gray-600)}
    .dc-btns{display:flex;flex-direction:column;gap:10px}
    .dc-btn{padding:12px 20px;border-radius:var(--r-sm);font-family:var(--font-body);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
    .dc-btn.primary{background:var(--navy);color:#fff}
    .dc-btn.primary:hover{background:var(--navy-mid)}
    .dc-btn.secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border)}
    .dc-btn.secondary:hover{border-color:var(--navy)}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:var(--charcoal);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;max-width:380px;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  </style>
  <script src="/js/api.js"></script>
</head>
<body>
<div class="sb-ov" id="sbOv"></div>
<div class="toast" id="toast"></div>

</aside>

<div class="main">
  <header class="topbar">
    <button class="topbar-ham" id="hamBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    <div class="topbar-ttl" id="topbarTtl">Topic Drill</div>
    <div class="topbar-r"><a href="profile.html" class="topbar-av" id="topAv">--</a></div>
  </header>
  <main class="page" id="mainContent">
    <div style="padding:40px;text-align:center;color:var(--gray-400)">Loading...</div>
  </main>
</div>

<script>
let PX_USER = null;
let currentSubject = null;
let currentTopic = null;
let drillQuestions = [];
let drillIndex = 0;
let drillAnswers = {};
let drillStartTime = null;

// Check URL params
const urlParams = new URLSearchParams(window.location.search);
const paramSubject = urlParams.get('subject');

(async () => {
  try {
    const data = await PX.get('/auth/me');
    if (!data || !data.user) { window.location.href = '/login.html'; return; }
    PX_USER = data.user;
    if (!PX_USER.profileComplete) { window.location.href = '/profile-setup.html'; return; }
    initUser();
    if (paramSubject) {
      currentSubject = paramSubject;
      showTopicSelection(paramSubject);
    } else {
      showSubjectSelection();
    }
  } catch(e) { window.location.href = '/login.html'; }
})();

function initUser() {
  const u = PX_USER;
  const initials = ((u.firstName||'')[0]+(u.lastName||'')[0]).toUpperCase()||'--';
  document.querySelectorAll('.sb-av,#sbAv,#topAv').forEach(el => el.textContent = initials);
  document.getElementById('sbUname').textContent = (u.firstName+' '+u.lastName).trim();
  document.getElementById('sbRole').textContent = (u.examFocus==='oau'?'OAU':'UNILAG')+' Post-UTME · 2026';
}

/* ═══════════════════════════════════
   SUBJECT SELECTION
═══════════════════════════════════ */
function showSubjectSelection() {
  document.getElementById('topbarTtl').textContent = 'Topic Drill';
  const subjects = (PX_USER.selectedSubjects || []);
  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <h1 class="page-heading">Topic Drill</h1>
    <p class="page-subheading">Select a subject to start drilling by topic</p>
    <div class="subject-grid" id="subjectGrid">
      ${subjects.map(s => `
        <div class="subj-card" onclick="selectSubject('${encodeURIComponent(s)}')">
          <div class="subj-card-name">${s}</div>
          <div class="subj-card-bar-wrap"><div class="subj-card-bar-fill" style="width:0%"></div></div>
          <div class="subj-card-meta">
            <span class="subj-mastery-badge smb-not-started">Not Started</span>
          </div>
        </div>`).join('')}
    </div>`;

  // Load mastery data
  loadSubjectMastery(subjects);
}

async function loadSubjectMastery(subjects) {
  try {
    const dash = await PX.get('/dashboard');
    if (!dash || !dash.subjectMastery) return;
    const grid = document.getElementById('subjectGrid');
    if (!grid) return;
    const cards = grid.querySelectorAll('.subj-card');
    subjects.forEach((s, i) => {
      const data = dash.subjectMastery.find(m => m.subject === s);
      if (!data || !cards[i]) return;
      const score = data.avgScore || 0;
      const level = data.level || 'Not Started';
      const levelClass = 'smb-' + level.toLowerCase().replace(/ /g,'-');
      const barFill = cards[i].querySelector('.subj-card-bar-fill');
      if (barFill) barFill.style.width = score + '%';
      const badge = cards[i].querySelector('.subj-mastery-badge');
      if (badge) { badge.className = 'subj-mastery-badge ' + levelClass; badge.textContent = level; }
    });
  } catch(e) {}
}

function selectSubject(encodedSubject) {
  currentSubject = decodeURIComponent(encodedSubject);
  showTopicSelection(currentSubject);
}

/* ═══════════════════════════════════
   TOPIC SELECTION
═══════════════════════════════════ */
async function showTopicSelection(subject) {
  document.getElementById('topbarTtl').textContent = subject;
  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <button class="back-btn" onclick="showSubjectSelection()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
      All Subjects
    </button>
    <h1 class="page-heading">${subject}</h1>
    <p class="page-subheading">Select a topic to drill</p>
    <div class="topic-list" id="topicList">
      <div class="skel" style="height:60px;margin-bottom:8px"></div>
      <div class="skel" style="height:60px;margin-bottom:8px"></div>
      <div class="skel" style="height:60px"></div>
    </div>`;

  try {
    const focus = PX_USER.examFocus || 'unilag';
    const data = await PX.get('/questions/topics?category='+focus+'&subject='+encodeURIComponent(subject));
    renderTopics(data && data.topics ? data.topics : []);
  } catch(e) {
    document.getElementById('topicList').innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:13px">Failed to load topics.</div>';
  }
}

function renderTopics(topics) {
  const list = document.getElementById('topicList');
  if (!topics || topics.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:var(--gray-400);font-size:13px;text-align:center">No topics found for this subject yet.</div>';
    return;
  }
  list.innerHTML = topics.map(t => {
    const level = t.masteryLevel || 'Not Started';
    const levelClass = 'smb-' + level.toLowerCase().replace(/ /g,'-');
    return `<div class="topic-row" onclick="startDrill('${encodeURIComponent(t.topic)}')">
      <div class="topic-info">
        <div class="topic-name">${t.topic}</div>
        <div class="topic-meta">${t.questionCount} question${t.questionCount!==1?'s':''} · ${t.attempts} attempt${t.attempts!==1?'s':''}</div>
      </div>
      <div class="topic-right">
        <span class="subj-mastery-badge ${levelClass}">${level}</span>
        <div class="topic-arr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg></div>
      </div>
    </div>`;
  }).join('');
}

/* ═══════════════════════════════════
   DRILL
═══════════════════════════════════ */
async function startDrill(encodedTopic) {
  currentTopic = decodeURIComponent(encodedTopic);
  document.getElementById('topbarTtl').textContent = currentTopic;
  const content = document.getElementById('mainContent');
  content.innerHTML = `<div style="padding:40px;text-align:center;color:var(--gray-400)">Loading questions...</div>`;

  try {
    const focus = PX_USER.examFocus || 'unilag';
    const data = await PX.get('/questions?category='+focus+'&subject='+encodeURIComponent(currentSubject)+'&topic='+encodeURIComponent(currentTopic)+'&limit=20&shuffle=true');
    drillQuestions = (data && data.questions) ? data.questions : [];

    if (drillQuestions.length === 0) {
      content.innerHTML = `
        <button class="back-btn" onclick="showTopicSelection('${currentSubject}')">Back to Topics</button>
        <div style="padding:40px;text-align:center;color:var(--gray-400)">No questions found for this topic yet.</div>`;
      return;
    }

    drillIndex = 0;
    drillAnswers = {};
    drillStartTime = Date.now();
    showDrillQuestion();
  } catch(e) {
    content.innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)">Failed to load questions.</div>';
  }
}

function showDrillQuestion() {
  if (drillIndex >= drillQuestions.length) {
    showDrillComplete();
    return;
  }

  const q = drillQuestions[drillIndex];
  const progress = ((drillIndex) / drillQuestions.length) * 100;
  const content = document.getElementById('mainContent');

  content.innerHTML = `
    <button class="back-btn" onclick="showTopicSelection('${currentSubject}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
      ${currentSubject}
    </button>
    <div class="drill-progress"><div class="drill-progress-fill" style="width:${progress}%"></div></div>
    <div class="q-card" id="drillCard">
      <div class="q-meta">Question ${drillIndex+1} of ${drillQuestions.length} — ${currentTopic}</div>
      <div class="q-text">${q.question}</div>
      <div class="options" id="drillOptions">
        ${['A','B','C','D'].map(key => `
          <div class="option" onclick="answerDrill('${key}')" data-key="${key}">
            <div class="opt-key">${key}</div>
            <div class="opt-text">${q['option'+key]}</div>
          </div>`).join('')}
      </div>
    </div>`;
}

async function answerDrill(selected) {
  const q = drillQuestions[drillIndex];

  // Fetch the correct answer
  let correctAnswer = null;
  try {
    const ansData = await PX.get('/questions/'+q.id+'/answer');
    correctAnswer = ansData ? ansData.answer : null;
  } catch(e) {}

  const isCorrect = selected === correctAnswer;
  drillAnswers[drillIndex] = { selected, correct: correctAnswer, isCorrect };

  // Lock all options and show feedback
  const options = document.querySelectorAll('.option');
  options.forEach(opt => {
    opt.classList.add('locked');
    opt.onclick = null;
    const key = opt.dataset.key;
    if (key === correctAnswer) opt.classList.add('correct');
    else if (key === selected && !isCorrect) opt.classList.add('wrong');
  });

  // Add feedback
  const card = document.getElementById('drillCard');
  const feedbackHTML = `
    <div class="feedback-box ${isCorrect?'correct':'wrong'}">
      <div class="feedback-label">${isCorrect ? 'Correct!' : 'Incorrect'}</div>
      ${!isCorrect && correctAnswer ? `<div class="correct-answer-text">The correct answer is ${correctAnswer}</div>` : ''}
    </div>
    ${q.explanation ? `
      <div class="explanation-card">
        <div class="expl-ttl">Explanation</div>
        <div class="expl-body">${q.explanation}</div>
      </div>` : ''}
    <button class="next-btn" onclick="nextDrillQuestion()">
      ${drillIndex + 1 >= drillQuestions.length ? 'Finish Drill' : 'Next Question'}
    </button>`;

  card.insertAdjacentHTML('beforeend', feedbackHTML);
}

function nextDrillQuestion() {
  drillIndex++;
  if (drillIndex >= drillQuestions.length) {
    showDrillComplete();
  } else {
    showDrillQuestion();
  }
}

async function showDrillComplete() {
  const total = drillQuestions.length;
  const correct = Object.values(drillAnswers).filter(a => a.isCorrect).length;
  const score = total > 0 ? Math.round((correct / total) * 100) : 0;
  const timeTaken = Math.floor((Date.now() - drillStartTime) / 1000);

  let masteryLevel = 'Attempted';
  if (score >= 80) masteryLevel = 'Mastered';
  else if (score >= 61) masteryLevel = 'Improving';
  else if (score >= 41) masteryLevel = 'Learning';

  const masteryClass = score >= 80 ? 'green' : score >= 61 ? 'green' : score >= 41 ? 'amber' : 'gray';
  const masteryMsg = score >= 80 ? 'Topic mastered!' : score >= 60 ? 'Good progress. Keep practicing.' : 'This topic needs more practice.';

  const content = document.getElementById('mainContent');
  content.innerHTML = `
    <div class="drill-complete">
      <div class="dc-score">${score}%</div>
      <div class="dc-sub">${correct} of ${total} questions correct</div>
      <div class="dc-mastery ${masteryClass}">${masteryMsg}</div>
      <div style="font-size:13px;color:var(--gray-600);margin-bottom:24px">
        Your mastery of <strong>${currentTopic}</strong> is now <strong>${masteryLevel}</strong>
      </div>
      <div class="dc-btns">
        <button class="dc-btn primary" onclick="startDrill('${encodeURIComponent(currentTopic)}')">Practice Again</button>
        <button class="dc-btn secondary" onclick="showTopicSelection('${currentSubject}')">Choose Another Topic</button>
        <button class="dc-btn secondary" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      </div>
    </div>`;

  // Submit session
  try {
    const answers = {};
    drillQuestions.forEach((q, i) => {
      if (drillAnswers[i]) answers[q.id] = { selected: drillAnswers[i].selected };
    });
    await PX.post('/sessions/submit', {
      mode: 'topic-drill',
      category: PX_USER.examFocus || 'unilag',
      subject: currentSubject,
      topic: currentTopic,
      answers,
      timeTaken,
    });
  } catch(e) {}
}

/* ═══════════════════════════════════
   SIDEBAR + UTILS
═══════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
const sb = document.getElementById('sidebar');
const ov = document.getElementById('sbOv');
const ham = document.getElementById('hamBtn');
function closeSidebar() { sb.classList.remove('open'); ov.classList.remove('show'); ham.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
function openSidebar() { sb.classList.add('open'); ov.classList.add('show'); ham.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
ham.addEventListener('click', () => sb.classList.contains('open') ? closeSidebar() : openSidebar());
ov.addEventListener('click', closeSidebar);
</script>
</body>
</html>
