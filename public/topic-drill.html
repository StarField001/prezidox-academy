<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Topic Drill — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--navy-light:#1e3f6e;--navy-deep:#081729;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;
      --gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;
      --border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--red-pale:#FEF2F2;--amber:#D97706;
      --sidebar-w:252px;--topbar-h:62px;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --shadow-sm:0 2px 8px rgba(11,31,58,.07);
      --shadow-md:0 4px 20px rgba(11,31,58,.10);
      --shadow-lg:0 8px 40px rgba(11,31,58,.13);
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased;overflow-x:hidden;-webkit-tap-highlight-color:rgba(229,161,0,.18)}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
    svg{display:block}
    :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:4px}
    ::selection{background:var(--gold-pale);color:var(--navy)}

    /* SIDEBAR */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--navy);display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none;flex-shrink:0}
    .sb-logo-mark{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .sb-logo-name{font-family:var(--font-display);font-size:16px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:block}
    .sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
    .sb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.24);padding:12px 10px 4px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.56);transition:all .15s;position:relative;min-height:38px}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:17px;flex-shrink:0;display:flex;align-items:center}
    .sb-user{padding:11px 13px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .sb-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:rgba(255,255,255,.38)}
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);z-index:99;backdrop-filter:blur(2px)}
    .sb-ov.show{display:block}

    /* MAIN / TOPBAR */
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,26px);gap:12px;box-shadow:0 1px 4px rgba(11,31,58,.06)}
    .topbar-ham{display:none;flex-direction:column;gap:4px;padding:10px 8px;flex-shrink:0;min-width:44px;min-height:44px;justify-content:center;align-items:center}
    @media(max-width:960px){.topbar-ham{display:flex}}
    .topbar-ham span{display:block;width:19px;height:1.8px;background:var(--navy);border-radius:2px}
    .topbar-ttl{font-family:var(--font-display);font-size:17px;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-decoration:none;flex-shrink:0}
    .page{padding:clamp(16px,3vw,26px);flex:1;max-width:760px;width:100%}

    .back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--navy);padding:10px 0;margin-bottom:12px;cursor:pointer;background:none;border:none;min-height:44px;transition:color .15s}
    .back-btn:hover{color:var(--gold-deep)}
    .page-heading{font-family:var(--font-display);font-size:25px;color:var(--navy);margin-bottom:4px}
    .page-subheading{font-size:14px;color:var(--gray-600);margin-bottom:22px}

    /* SKELETON */
    .skel{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ENTER ANIMATION */
    .screen-in{animation:screenIn .35s ease}
    @keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

    /* RESUME BANNER */
    .resume-card{display:flex;align-items:center;gap:13px;background:var(--navy);border-radius:var(--r-lg);padding:15px 18px;margin-bottom:20px;flex-wrap:wrap}
    .resume-ic{width:38px;height:38px;border-radius:10px;background:rgba(229,161,0,.14);border:1px solid rgba(229,161,0,.26);display:flex;align-items:center;justify-content:center;color:var(--gold-bright);flex-shrink:0}
    .resume-info{flex:1;min-width:180px}
    .resume-ttl{font-size:13px;font-weight:700;color:#fff}
    .resume-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:2px}
    .resume-btns{display:flex;gap:8px}
    .resume-go{padding:9px 18px;border-radius:var(--r-sm);background:var(--gold);color:var(--navy);font-size:12px;font-weight:700;min-height:38px}
    .resume-go:hover{background:var(--gold-bright)}
    .resume-x{padding:9px 12px;border-radius:var(--r-sm);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:12px;font-weight:600;min-height:38px}
    .resume-x:hover{background:rgba(255,255,255,.14);color:#fff}

    /* SUBJECT GRID */
    .subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
    .subj-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .2s;text-align:left;width:100%}
    .subj-card:hover{border-color:var(--navy);box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .subj-card-name{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:12px}
    .subj-card-bar-wrap{height:4px;background:var(--gray-100);border-radius:var(--r-full);overflow:hidden;margin-bottom:10px}
    .subj-card-bar-fill{height:100%;width:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--green),#4ade80);transform:scaleX(0);transform-origin:left;transition:transform .8s ease}
    .subj-card-meta{display:flex;align-items:center;justify-content:space-between;gap:6px}
    .subj-mastery-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-full);white-space:nowrap}
    .smb-not-started,.smb-attempted{background:var(--gray-100);color:var(--gray-600)}
    .smb-learning{background:#EFF6FF;color:#2563eb}
    .smb-improving{background:rgba(217,119,6,.1);color:var(--amber)}
    .smb-mastered{background:var(--green-pale);color:var(--green)}
    .smb-expert{background:var(--gold-pale);color:var(--gold-deep)}
    .subj-card-pct{font-size:12px;font-weight:700;color:var(--gray-600)}

    /* TOPIC GRID (visual cards with mastery colour) */
    .topic-grid{display:grid;grid-template-columns:1fr;gap:10px}
    @media(min-width:620px){.topic-grid{grid-template-columns:1fr 1fr}}
    .topic-card{position:relative;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px 18px 14px;cursor:pointer;transition:all .18s;text-align:left;width:100%;overflow:hidden;display:flex;flex-direction:column;gap:10px}
    .topic-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--tc,var(--gray-200))}
    .topic-card:hover{border-color:var(--navy);box-shadow:var(--shadow-md);transform:translateY(-2px)}
    .topic-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .topic-name{font-size:14px;font-weight:700;color:var(--navy);line-height:1.4}
    .topic-arr{color:var(--gray-200);flex-shrink:0;transition:color .15s;margin-top:2px}
    .topic-card:hover .topic-arr{color:var(--navy)}
    .topic-card-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .topic-meta{font-size:11px;color:var(--gray-600)}

    /* DRILL SCREEN */
    .drill-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    .drill-count{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-600)}
    .drill-count b{color:var(--navy)}
    .streak-chip{display:none;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--gold-deep);background:var(--gold-pale);border:1px solid rgba(229,161,0,.3);border-radius:var(--r-full);padding:5px 12px;animation:popIn .3s ease}
    .streak-chip.show{display:inline-flex}
    @keyframes popIn{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
    .drill-progress{background:var(--gray-100);height:5px;border-radius:var(--r-full);overflow:hidden;margin-bottom:18px}
    .drill-progress-fill{height:100%;width:100%;border-radius:var(--r-full);background:linear-gradient(90deg,var(--gold),var(--gold-bright));transform:scaleX(0);transform-origin:left;transition:transform .4s ease}
    .q-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:clamp(18px,3.5vw,26px);margin-bottom:16px;box-shadow:var(--shadow-sm)}
    .q-card.flash-correct{animation:flashCorrect .5s ease}
    .q-card.flash-wrong{animation:flashWrong .5s ease}
    @keyframes flashCorrect{0%,100%{box-shadow:var(--shadow-sm)}35%{box-shadow:0 0 0 4px rgba(24,163,74,.28)}}
    @keyframes flashWrong{0%,100%{box-shadow:var(--shadow-sm)}25%,75%{transform:translateX(-4px)}50%{transform:translateX(4px);box-shadow:0 0 0 4px rgba(220,38,38,.24)}}
    .q-meta{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-600);margin-bottom:12px}
    .q-text{font-size:15.5px;color:var(--navy);line-height:1.75;margin-bottom:20px;font-weight:500}
    .options{display:flex;flex-direction:column;gap:10px}
    .option{display:flex;align-items:center;gap:12px;padding:13px 15px;min-height:52px;border-radius:var(--r-md);border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s,background .15s,transform .15s;user-select:none;text-align:left;width:100%;background:var(--white)}
    .option:hover:not(:disabled){border-color:var(--navy);background:rgba(11,31,58,.02);transform:translateX(3px)}
    .option:disabled{cursor:default}
    .option.pending{border-color:var(--gold);background:var(--gold-pale)}
    .option.correct{border-color:var(--green);background:var(--green-pale)}
    .option.wrong{border-color:var(--red);background:var(--red-pale)}
    .option.dim{opacity:.45}
    .opt-key{width:30px;height:30px;border-radius:8px;background:var(--gray-100);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gray-600);flex-shrink:0;transition:all .15s}
    .option.pending .opt-key{background:var(--gold);color:var(--navy);border-color:var(--gold)}
    .option.correct .opt-key{background:var(--green);color:#fff;border-color:var(--green)}
    .option.wrong .opt-key{background:var(--red);color:#fff;border-color:var(--red)}
    .opt-text{font-size:14px;color:var(--gray-800);line-height:1.55}
    .option.correct .opt-text{color:var(--green);font-weight:600}
    .option.wrong .opt-text{color:var(--red)}
    .kbd-hint{font-size:11px;color:var(--gray-400);text-align:center;margin-top:12px;display:none}
    @media(min-width:960px){.kbd-hint{display:block}}
    .kbd-hint b{display:inline-block;padding:1px 6px;border:1px solid var(--gray-200);border-radius:4px;font-weight:600;color:var(--gray-600);background:var(--white)}

    /* FEEDBACK */
    .feedback-wrap{overflow:hidden}
    .feedback-inner{animation:slideIn .35s ease}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
    .feedback-box{border-radius:var(--r-md);padding:14px 16px;margin-top:16px;display:flex;align-items:flex-start;gap:10px}
    .feedback-box.correct{background:var(--green-pale);border:1px solid rgba(24,163,74,.2)}
    .feedback-box.wrong{background:var(--red-pale);border:1px solid rgba(220,38,38,.2)}
    .fb-ic{flex-shrink:0;margin-top:1px}
    .feedback-box.correct .fb-ic{color:var(--green)}
    .feedback-box.wrong .fb-ic{color:var(--red)}
    .feedback-label{font-size:13.5px;font-weight:700}
    .feedback-box.correct .feedback-label{color:var(--green)}
    .feedback-box.wrong .feedback-label{color:var(--red)}
    .correct-answer-text{font-size:12.5px;color:var(--gray-600);margin-top:3px}
    .explanation-card{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--r-md);padding:14px 16px;margin-top:10px}
    .expl-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-600);margin-bottom:6px;display:flex;align-items:center;gap:6px}
    .expl-ttl svg{color:var(--gold-deep)}
    .expl-body{font-size:13.5px;color:var(--gray-800);line-height:1.7}
    .next-btn{width:100%;min-height:48px;padding:13px;border-radius:var(--r-sm);background:var(--navy);color:#fff;font-family:var(--font-body);font-size:14px;font-weight:700;border:none;cursor:pointer;margin-top:14px;transition:background .15s,transform .15s;display:flex;align-items:center;justify-content:center;gap:8px}
    .next-btn:hover{background:var(--navy-mid);transform:translateY(-1px)}

    /* DRILL COMPLETE */
    .drill-complete{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:clamp(24px,5vw,36px);text-align:center;box-shadow:var(--shadow-md)}
    .dc-eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:10px}
    .dc-score{font-family:var(--font-display);font-size:clamp(46px,9vw,58px);color:var(--navy);line-height:1;margin-bottom:6px;font-variant-numeric:tabular-nums}
    .dc-sub{font-size:14px;color:var(--gray-600);margin-bottom:22px}
    .dc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
    @media(max-width:420px){.dc-stats{grid-template-columns:1fr}}
    .dcs{background:var(--gray-50);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 10px}
    .dcs-num{font-family:var(--font-display);font-size:20px;color:var(--navy);line-height:1;font-variant-numeric:tabular-nums}
    .dcs-lbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gray-600);margin-top:5px}
    .dc-mastery-change{display:inline-flex;align-items:center;gap:9px;background:var(--gold-pale);border:1px solid rgba(229,161,0,.28);border-radius:var(--r-full);padding:9px 18px;margin-bottom:8px;font-size:13px;font-weight:700}
    .dc-mastery-change .from{color:var(--gray-600)}
    .dc-mastery-change svg{color:var(--gold-deep)}
    .dc-mastery-change .to{color:var(--gold-deep)}
    .dc-topic-line{font-size:13px;color:var(--gray-600);margin-bottom:24px}
    .dc-topic-line strong{color:var(--navy)}
    .dc-btns{display:flex;flex-direction:column;gap:10px}
    .dc-btn{padding:13px 20px;min-height:48px;border-radius:var(--r-sm);font-family:var(--font-body);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
    .dc-btn.primary{background:var(--navy);color:#fff}
    .dc-btn.primary:hover{background:var(--navy-mid);transform:translateY(-1px)}
    .dc-btn.secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border)}
    .dc-btn.secondary:hover{border-color:var(--navy);transform:translateY(-1px)}

    /* EMPTY / ERROR STATES */
    .state-box{text-align:center;padding:44px 20px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg)}
    .state-ic{width:56px;height:56px;border-radius:16px;background:var(--gold-pale);border:1px solid rgba(229,161,0,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gold-deep)}
    .state-ic.err{background:var(--red-pale);border-color:rgba(220,38,38,.2);color:var(--red)}
    .state-h{font-family:var(--font-display);font-size:19px;color:var(--navy);margin-bottom:8px}
    .state-p{font-size:13.5px;color:var(--gray-600);line-height:1.65;max-width:340px;margin:0 auto 20px}
    .state-btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;min-height:44px;border-radius:var(--r-sm);background:var(--navy);color:#fff;font-size:13px;font-weight:700;transition:background .15s}
    .state-btn:hover{background:var(--navy-mid)}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:var(--navy-deep);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;max-width:380px;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
  <script src="/js/api.js"></script>
</head>
<body>
<div class="sb-ov" id="sbOv"></div>
<div class="toast" id="toast"></div>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sb-logo">
    <svg class="sb-logo-mark" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#E5A100"/><path d="M7 10h12c4.8 0 8.5 3.8 8.5 8.5S23.8 27 19 27H7V10z" fill="#0B1F3A"/><circle cx="19" cy="18.5" r="3.2" fill="#E5A100"/></svg>
    <div><div class="sb-logo-name">Prezidox</div><span class="sb-logo-sub">Academy</span></div>
  </a>
  <nav class="sb-nav">

<div class="main">
  <header class="topbar">
    <button class="topbar-ham" id="hamBtn" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
    <div class="topbar-ttl" id="topbarTtl">Topic Drill</div>
    <div class="topbar-r"><a href="profile.html" class="topbar-av" id="topAv" aria-label="Profile">--</a></div>
  </header>
  <main class="page" id="mainContent">
    <div class="skel" style="height:28px;width:40%;margin-bottom:10px"></div>
    <div class="skel" style="height:15px;width:60%;margin-bottom:24px"></div>
    <div class="subject-grid">
      <div class="skel" style="height:110px"></div>
      <div class="skel" style="height:110px"></div>
      <div class="skel" style="height:110px"></div>
      <div class="skel" style="height:110px"></div>
    </div>
  </main>
</div>

<script>
let PX_USER = null;
let currentSubject = null;
let currentTopic = null;
let drillQuestions = [];
let drillIndex = 0;
let drillAnswers = {};
let sessionStreak = 0;
let bestSessionStreak = 0;
let drillStartTime = null;
let drillElapsedBase = 0;           // seconds carried over from a resumed drill
let topicDataCache = {};            // subject::topic -> { masteryLevel, attempts } from API
let localMasteryCache = {};         // subject::topic -> { level, attempts } updated after drill
let answerLocked = false;
let feedbackShown = false;

const RESUME_KEY = 'px_drill_resume';
const MASTERY_ORDER = ['Not Started','Attempted','Learning','Improving','Mastered','Expert'];

function el(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtTime(secs){ const m=Math.floor(secs/60),s=secs%60; return m>0?`${m}m ${s}s`:`${s}s`; }
function badgeClass(level){ return 'smb-'+String(level||'Not Started').toLowerCase().replace(/ /g,'-'); }
function masteryColor(level){
  switch(level){
    case 'Expert': return 'var(--gold)';
    case 'Mastered': return 'var(--green)';
    case 'Improving': return 'var(--amber)';
    case 'Learning': return '#2563eb';
    default: return 'var(--gray-200)';
  }
}

// URL params
const urlParams = new URLSearchParams(window.location.search);
const paramSubject = urlParams.get('subject');

(async () => {
  try {
    const data = await PX.get('/auth/me');
    if (!data || !data.user) { window.location.href = '/login.html'; return; }
    PX_USER = data.user;
    if (!PX_USER.profileComplete) { window.location.href = '/profile-setup.html'; return; }
    initUser();
    if (paramSubject && (PX_USER.selectedSubjects||[]).includes(paramSubject)) {
      currentSubject = paramSubject;
      showTopicSelection(paramSubject);
    } else {
      showSubjectSelection();
    }
  } catch(e) { window.location.href = '/login.html'; }
})();

function initUser() {
  const u = PX_USER;
  const initials = (((u.firstName||'')[0]||'')+((u.lastName||'')[0]||'')).toUpperCase()||'--';
  document.querySelectorAll('#sbAv,#topAv').forEach(n => n.textContent = initials);
  el('sbUname').textContent = ((u.firstName||'')+' '+(u.lastName||'')).trim();
  el('sbRole').textContent = (u.examFocus==='oau'?'OAU':'UNILAG')+' Post-UTME · 2026';
}

/* ═══ RESUME (localStorage holds drill progress only — never auth) ═══ */
function saveResume() {
  try {
    localStorage.setItem(RESUME_KEY, JSON.stringify({
      subject: currentSubject, topic: currentTopic,
      questions: drillQuestions, index: drillIndex, answers: drillAnswers,
      streak: sessionStreak, bestStreak: bestSessionStreak,
      elapsed: drillElapsedBase + Math.floor((Date.now()-drillStartTime)/1000),
      savedAt: Date.now(),
    }));
  } catch(e) {}
}
function clearResume() { try { localStorage.removeItem(RESUME_KEY); } catch(e) {} }
function getResume() {
  try {
    const raw = localStorage.getItem(RESUME_KEY);
    if (!raw) return null;
    const r = JSON.parse(raw);
    if (!r || !r.questions || !r.questions.length) return null;
    if (Date.now() - (r.savedAt||0) > 24*3600*1000) { clearResume(); return null; }
    if (r.index >= r.questions.length) { clearResume(); return null; }
    return r;
  } catch(e) { return null; }
}
function resumeDrill() {
  const r = getResume();
  if (!r) { showToast('Nothing to resume.'); showSubjectSelection(); return; }
  currentSubject = r.subject; currentTopic = r.topic;
  drillQuestions = r.questions; drillIndex = r.index; drillAnswers = r.answers||{};
  sessionStreak = r.streak||0; bestSessionStreak = r.bestStreak||0;
  drillElapsedBase = r.elapsed||0; drillStartTime = Date.now();
  el('topbarTtl').textContent = currentTopic;
  showDrillQuestion();
}
function dismissResume() { clearResume(); showSubjectSelection(); }

/* ═══ SUBJECT SELECTION ═══ */
function showSubjectSelection() {
  el('topbarTtl').textContent = 'Topic Drill';
  const subjects = (PX_USER.selectedSubjects || []);
  const content = el('mainContent');
  const r = getResume();
  const resumeHtml = r ? `
    <div class="resume-card">
      <div class="resume-ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/></svg></div>
      <div class="resume-info">
        <div class="resume-ttl">Continue where you left off</div>
        <div class="resume-sub">${esc(r.subject)} · ${esc(r.topic)} — question ${r.index+1} of ${r.questions.length}</div>
      </div>
      <div class="resume-btns">
        <button class="resume-go" id="resumeGoBtn">Continue</button>
        <button class="resume-x" id="resumeXBtn" aria-label="Dismiss saved drill">Dismiss</button>
      </div>
    </div>` : '';

  if (!subjects.length) {
    content.innerHTML = `<div class="screen-in">
      <h1 class="page-heading">Topic Drill</h1>
      <p class="page-subheading">Drill one topic at a time with instant feedback</p>
      <div class="state-box">
        <div class="state-ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg></div>
        <div class="state-h">No subjects selected yet</div>
        <p class="state-p">Choose your exam focus and subjects on the dashboard, then come back to start drilling.</p>
        <a href="dashboard.html" class="state-btn">Go to Dashboard</a>
      </div>
    </div>`;
    return;
  }

  content.innerHTML = `<div class="screen-in">
    ${resumeHtml}
    <h1 class="page-heading">Topic Drill</h1>
    <p class="page-subheading">Select a subject to start drilling by topic</p>
    <div class="subject-grid" id="subjectGrid">
      ${subjects.map((s,i) => `
        <button class="subj-card" data-subject-idx="${i}">
          <div class="subj-card-name">${esc(s)}</div>
          <div class="subj-card-bar-wrap"><div class="subj-card-bar-fill"></div></div>
          <div class="subj-card-meta">
            <span class="subj-mastery-badge smb-not-started">Not Started</span>
            <span class="subj-card-pct"></span>
          </div>
        </button>`).join('')}
    </div>
  </div>`;

  el('subjectGrid').addEventListener('click', e => {
    const card = e.target.closest('[data-subject-idx]');
    if (!card) return;
    currentSubject = subjects[parseInt(card.dataset.subjectIdx,10)];
    showTopicSelection(currentSubject);
  });
  if (r) {
    el('resumeGoBtn').addEventListener('click', resumeDrill);
    el('resumeXBtn').addEventListener('click', dismissResume);
  }
  loadSubjectMastery(subjects);
}

async function loadSubjectMastery(subjects) {
  try {
    const dash = await PX.get('/dashboard');
    if (!dash || !dash.subjectMastery) return;
    const grid = el('subjectGrid');
    if (!grid) return;
    const cards = grid.querySelectorAll('.subj-card');
    subjects.forEach((s, i) => {
      const data = dash.subjectMastery.find(m => m.subject === s);
      if (!data || !cards[i]) return;
      const score = data.avgScore || 0;
      const level = data.level || 'Not Started';
      const barFill = cards[i].querySelector('.subj-card-bar-fill');
      if (barFill) requestAnimationFrame(()=>{ barFill.style.transform = `scaleX(${score/100})`; });
      const badge = cards[i].querySelector('.subj-mastery-badge');
      if (badge) { badge.className = 'subj-mastery-badge ' + badgeClass(level); badge.textContent = level; }
      const pct = cards[i].querySelector('.subj-card-pct');
      if (pct && score > 0) pct.textContent = score + '%';
    });
  } catch(e) {}
}

/* ═══ TOPIC SELECTION ═══ */
async function showTopicSelection(subject) {
  el('topbarTtl').textContent = subject;
  const content = el('mainContent');
  content.innerHTML = `<div class="screen-in">
    <button class="back-btn" id="backToSubjects">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
      All Subjects
    </button>
    <h1 class="page-heading">${esc(subject)}</h1>
    <p class="page-subheading">Select a topic to drill</p>
    <div class="topic-grid" id="topicList">
      <div class="skel" style="height:86px"></div>
      <div class="skel" style="height:86px"></div>
      <div class="skel" style="height:86px"></div>
      <div class="skel" style="height:86px"></div>
    </div>
  </div>`;
  el('backToSubjects').addEventListener('click', showSubjectSelection);

  try {
    const focus = PX_USER.examFocus || 'unilag';
    const data = await PX.get('/questions/topics?category='+encodeURIComponent(focus)+'&subject='+encodeURIComponent(subject));
    renderTopics(data && data.topics ? data.topics : []);
  } catch(e) {
    el('topicList').innerHTML = `
      <div class="state-box" style="grid-column:1/-1">
        <div class="state-ic err"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg></div>
        <div class="state-h">Couldn't load topics</div>
        <p class="state-p">Check your connection and try again.</p>
        <button class="state-btn" onclick="showTopicSelection(currentSubject)">Retry</button>
      </div>`;
  }
}

function renderTopics(topics) {
  const list = el('topicList');
  if (!list) return;
  if (!topics || topics.length === 0) {
    list.innerHTML = `
      <div class="state-box" style="grid-column:1/-1">
        <div class="state-ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg></div>
        <div class="state-h">No topics here yet</div>
        <p class="state-p">Questions for this subject are still being added. Try another subject for now.</p>
        <button class="state-btn" onclick="showSubjectSelection()">Choose Another Subject</button>
      </div>`;
    return;
  }
  list.innerHTML = topics.map((t,i) => {
    const cacheKey = currentSubject + '::' + t.topic;
    topicDataCache[cacheKey] = { masteryLevel: t.masteryLevel || 'Not Started', attempts: t.attempts || 0 };
    const cached = localMasteryCache[cacheKey];
    const level = cached ? cached.level : (t.masteryLevel || 'Not Started');
    const attempts = cached ? cached.attempts : (t.attempts || 0);
    return `<button class="topic-card" data-topic-idx="${i}" style="--tc:${masteryColor(level)}">
      <div class="topic-card-top">
        <div class="topic-name">${esc(t.topic)}</div>
        <div class="topic-arr"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg></div>
      </div>
      <div class="topic-card-bottom">
        <span class="topic-meta">${t.questionCount} question${t.questionCount!==1?'s':''} · ${attempts} attempt${attempts!==1?'s':''}</span>
        <span class="subj-mastery-badge ${badgeClass(level)}">${esc(level)}</span>
      </div>
    </button>`;
  }).join('');
  list.addEventListener('click', e => {
    const card = e.target.closest('[data-topic-idx]');
    if (!card) return;
    startDrill(topics[parseInt(card.dataset.topicIdx,10)].topic);
  });
}

/* ═══ DRILL ═══ */
async function startDrill(topic) {
  currentTopic = topic;
  el('topbarTtl').textContent = currentTopic;
  const content = el('mainContent');
  content.innerHTML = `<div class="screen-in">
    <div class="skel" style="height:5px;margin-bottom:18px"></div>
    <div class="q-card">
      <div class="skel" style="height:12px;width:40%;margin-bottom:14px"></div>
      <div class="skel" style="height:16px;margin-bottom:8px"></div>
      <div class="skel" style="height:16px;width:75%;margin-bottom:20px"></div>
      <div class="skel" style="height:52px;margin-bottom:10px"></div>
      <div class="skel" style="height:52px;margin-bottom:10px"></div>
      <div class="skel" style="height:52px;margin-bottom:10px"></div>
      <div class="skel" style="height:52px"></div>
    </div>
  </div>`;

  try {
    const focus = PX_USER.examFocus || 'unilag';
    const data = await PX.get('/questions?category='+encodeURIComponent(focus)+'&subject='+encodeURIComponent(currentSubject)+'&topic='+encodeURIComponent(currentTopic)+'&limit=20&shuffle=true');
    drillQuestions = (data && data.questions) ? data.questions : [];

    if (drillQuestions.length === 0) {
      content.innerHTML = `<div class="screen-in">
        <div class="state-box">
          <div class="state-ic"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg></div>
          <div class="state-h">No questions in this topic yet</div>
          <p class="state-p">This topic is still being stocked. Pick another topic and keep the momentum going.</p>
          <button class="state-btn" onclick="showTopicSelection(currentSubject)">Back to Topics</button>
        </div>
      </div>`;
      return;
    }

    drillIndex = 0;
    drillAnswers = {};
    sessionStreak = 0;
    bestSessionStreak = 0;
    drillElapsedBase = 0;
    drillStartTime = Date.now();
    showDrillQuestion();
  } catch(e) {
    content.innerHTML = `<div class="screen-in">
      <div class="state-box">
        <div class="state-ic err"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg></div>
        <div class="state-h">Couldn't load questions</div>
        <p class="state-p">Check your connection and try again.</p>
        <button class="state-btn" onclick="showTopicSelection(currentSubject)">Back to Topics</button>
      </div>
    </div>`;
  }
}

function showDrillQuestion() {
  if (drillIndex >= drillQuestions.length) { showDrillComplete(); return; }

  answerLocked = false;
  feedbackShown = false;
  const q = drillQuestions[drillIndex];
  const progress = drillIndex / drillQuestions.length;
  const content = el('mainContent');

  content.innerHTML = `<div class="screen-in">
    <button class="back-btn" id="backToTopics">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
      ${esc(currentSubject)}
    </button>
    <div class="drill-head">
      <span class="drill-count">Question <b>${drillIndex+1}</b> of ${drillQuestions.length}</span>
      <span class="streak-chip${sessionStreak>=2?' show':''}" id="streakChip">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z"/></svg>
        ${sessionStreak} in a row
      </span>
    </div>
    <div class="drill-progress"><div class="drill-progress-fill" id="drillFill"></div></div>
    <div class="q-card" id="drillCard">
      <div class="q-meta">${esc(currentTopic)}</div>
      <div class="q-text">${esc(q.question)}</div>
      <div class="options" id="drillOptions">
        ${['A','B','C','D'].map(key => `
          <button class="option" data-key="${key}">
            <span class="opt-key">${key}</span>
            <span class="opt-text">${esc(q['option'+key])}</span>
          </button>`).join('')}
      </div>
      <div id="feedbackSlot" class="feedback-wrap" aria-live="polite"></div>
    </div>
    <p class="kbd-hint">Answer with <b>A</b><b>B</b><b>C</b><b>D</b> keys · <b>Enter</b> for next</p>
  </div>`;

  el('backToTopics').addEventListener('click', () => {
    saveResume();
    showTopicSelection(currentSubject);
  });
  el('drillOptions').addEventListener('click', e => {
    const opt = e.target.closest('.option');
    if (opt && !answerLocked) answerDrill(opt.dataset.key);
  });
  requestAnimationFrame(()=>{ const f=el('drillFill'); if(f) f.style.transform=`scaleX(${progress})`; });
}

async function answerDrill(selected) {
  if (answerLocked) return;
  answerLocked = true;

  const q = drillQuestions[drillIndex];
  const options = document.querySelectorAll('.option');
  options.forEach(opt => {
    opt.disabled = true;
    if (opt.dataset.key === selected) opt.classList.add('pending');
  });

  // Fetch the correct answer (kept server-side by design)
  let correctAnswer = null, serverExplanation = null;
  try {
    const ansData = await PX.get('/questions/'+encodeURIComponent(q.id)+'/answer');
    if (ansData) { correctAnswer = ansData.answer || null; serverExplanation = ansData.explanation || null; }
  } catch(e) {}

  if (!correctAnswer) {
    // Network failed — unlock and let the student retry the same question
    options.forEach(opt => { opt.disabled = false; opt.classList.remove('pending'); });
    answerLocked = false;
    showToast('Connection hiccup — tap your answer again.');
    return;
  }

  const isCorrect = selected === correctAnswer;
  drillAnswers[drillIndex] = { selected, correct: correctAnswer, isCorrect };

  // Streak within session
  if (isCorrect) { sessionStreak++; bestSessionStreak = Math.max(bestSessionStreak, sessionStreak); }
  else sessionStreak = 0;
  const chip = el('streakChip');
  if (chip) {
    chip.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z"/></svg> ${sessionStreak} in a row`;
    chip.classList.toggle('show', sessionStreak >= 2);
  }

  // Mark options + flash the card
  options.forEach(opt => {
    opt.classList.remove('pending');
    const key = opt.dataset.key;
    if (key === correctAnswer) opt.classList.add('correct');
    else if (key === selected) opt.classList.add('wrong');
    else opt.classList.add('dim');
  });
  const card = el('drillCard');
  card.classList.add(isCorrect ? 'flash-correct' : 'flash-wrong');

  const explanation = q.explanation || serverExplanation;
  const isLast = drillIndex + 1 >= drillQuestions.length;
  el('feedbackSlot').innerHTML = `<div class="feedback-inner">
    <div class="feedback-box ${isCorrect?'correct':'wrong'}">
      <span class="fb-ic">${isCorrect
        ? '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'
        : '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>'}</span>
      <span>
        <span class="feedback-label">${isCorrect ? 'Correct!' : 'Incorrect'}</span>
        ${!isCorrect ? `<span class="correct-answer-text" style="display:block">The correct answer is ${esc(correctAnswer)}</span>` : ''}
      </span>
    </div>
    ${explanation ? `
      <div class="explanation-card">
        <div class="expl-ttl">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 1 0-7.517 0c.85.493 1.509 1.333 1.509 2.316V18"/></svg>
          Explanation
        </div>
        <div class="expl-body">${esc(explanation)}</div>
      </div>` : ''}
    <button class="next-btn" id="nextBtn">
      ${isLast ? 'Finish Drill' : 'Next Question'}
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
    </button>
  </div>`;
  feedbackShown = true;
  el('nextBtn').addEventListener('click', nextDrillQuestion);
  el('nextBtn').focus({ preventScroll: true });
  saveResume();
}

function nextDrillQuestion() {
  drillIndex++;
  if (drillIndex >= drillQuestions.length) showDrillComplete();
  else { saveResume(); showDrillQuestion(); }
}

/* Keyboard shortcuts: A–D / 1–4 answer, Enter advances */
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if (!drillQuestions.length || drillIndex >= drillQuestions.length) return;
  if (feedbackShown && (e.key === 'Enter')) { e.preventDefault(); nextDrillQuestion(); return; }
  if (!answerLocked && el('drillOptions')) {
    const map = { a:'A', b:'B', c:'C', d:'D', '1':'A', '2':'B', '3':'C', '4':'D' };
    const key = map[e.key.toLowerCase()];
    if (key) { e.preventDefault(); answerDrill(key); }
  }
});

/* ═══ DRILL COMPLETE ═══ */
async function showDrillComplete() {
  clearResume();
  const total = drillQuestions.length;
  const answered = Object.keys(drillAnswers).length;
  const correct = Object.values(drillAnswers).filter(a => a.isCorrect).length;
  const clientScore = total > 0 ? Math.round((correct / total) * 100) : 0;
  const timeTaken = drillElapsedBase + Math.floor((Date.now() - drillStartTime) / 1000);
  const savedSubject = currentSubject;
  const savedTopic = currentTopic;
  const cacheKey = savedSubject + '::' + savedTopic;
  const prevLevel = (localMasteryCache[cacheKey] && localMasteryCache[cacheKey].level)
    || (topicDataCache[cacheKey] && topicDataCache[cacheKey].masteryLevel) || 'Not Started';

  const content = el('mainContent');
  content.innerHTML = `<div class="screen-in">
    <div class="q-card" style="text-align:center;padding:36px">
      <div class="skel" style="height:52px;width:130px;margin:0 auto 12px"></div>
      <div class="skel" style="height:14px;width:200px;margin:0 auto"></div>
      <p style="font-size:12px;color:var(--gray-600);margin-top:16px">Saving your results...</p>
    </div>
  </div>`;

  // Submit first, then render with the server's score
  let apiScore = clientScore;
  try {
    const answers = {};
    drillQuestions.forEach((q, i) => { if (drillAnswers[i]) answers[q.id] = { selected: drillAnswers[i].selected }; });
    const response = await PX.post('/sessions/submit', {
      mode: 'topic-drill',
      category: PX_USER.examFocus || 'unilag',
      subject: savedSubject,
      topic: savedTopic,
      answers,
      timeTaken,
    });
    if (response && response.session && response.session.score !== undefined) apiScore = response.session.score;
  } catch(e) {}

  let masteryLevel = 'Attempted';
  if (apiScore >= 80) masteryLevel = 'Mastered';
  else if (apiScore >= 61) masteryLevel = 'Improving';
  else if (apiScore >= 41) masteryLevel = 'Learning';

  const _prev = localMasteryCache[cacheKey];
  localMasteryCache[cacheKey] = { level: masteryLevel, attempts: _prev ? _prev.attempts + 1 : ((topicDataCache[cacheKey]?.attempts||0) + 1) };

  const improved = MASTERY_ORDER.indexOf(masteryLevel) > MASTERY_ORDER.indexOf(prevLevel);
  const masteryMsg = apiScore >= 80 ? 'Topic mastered — excellent work.' : apiScore >= 60 ? 'Good progress. Keep practicing.' : 'This topic needs more practice.';
  const accuracy = answered > 0 ? Math.round((correct/answered)*100) : 0;

  content.innerHTML = `<div class="screen-in">
    <div class="drill-complete">
      <div class="dc-eyebrow">Drill complete</div>
      <div class="dc-score" id="dcScore">0%</div>
      <div class="dc-sub">${masteryMsg}</div>
      <div class="dc-stats">
        <div class="dcs"><div class="dcs-num">${correct} / ${total}</div><div class="dcs-lbl">Correct</div></div>
        <div class="dcs"><div class="dcs-num">${accuracy}%</div><div class="dcs-lbl">Accuracy</div></div>
        <div class="dcs"><div class="dcs-num">${fmtTime(timeTaken)}</div><div class="dcs-lbl">Time spent</div></div>
      </div>
      ${bestSessionStreak >= 3 ? `<div class="dc-topic-line">Best run: <strong>${bestSessionStreak} correct in a row</strong></div>` : ''}
      <div class="dc-mastery-change">
        <span class="from">${esc(prevLevel)}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
        <span class="to">${esc(masteryLevel)}</span>
      </div>
      <div class="dc-topic-line">Your mastery of <strong>${esc(savedTopic)}</strong>${improved ? ' just moved up' : ''}</div>
      <div class="dc-btns">
        <button class="dc-btn primary" id="dcAgain">Practice Again</button>
        <button class="dc-btn secondary" id="dcTopics">Choose Another Topic</button>
        <button class="dc-btn secondary" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      </div>
    </div>
  </div>`;

  el('dcAgain').addEventListener('click', () => startDrill(savedTopic));
  el('dcTopics').addEventListener('click', () => showTopicSelection(savedSubject));

  // Animated score count-up
  const scoreEl = el('dcScore');
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (reduce || apiScore === 0) { scoreEl.textContent = apiScore + '%'; }
  else {
    const dur = 900, start = performance.now();
    (function frame(now){
      const p = Math.min((now-start)/dur, 1), eased = 1 - Math.pow(1-p, 3);
      scoreEl.textContent = Math.round(apiScore*eased) + '%';
      if (p < 1) requestAnimationFrame(frame);
    })(performance.now());
  }
}

/* ═══ SIDEBAR + UTILS ═══ */
let toastTimer;
function showToast(msg) {
  const t = el('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}
const sb = el('sidebar');
const ov = el('sbOv');
const ham = el('hamBtn');
function closeSidebar() { sb.classList.remove('open'); ov.classList.remove('show'); ham.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
function openSidebar() { sb.classList.add('open'); ov.classList.add('show'); ham.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
ham.addEventListener('click', () => sb.classList.contains('open') ? closeSidebar() : openSidebar());
ov.addEventListener('click', closeSidebar);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && sb.classList.contains('open')) closeSidebar(); });
</script>
</body>
</html>
