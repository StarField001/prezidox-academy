<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — Prezidox Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0B1F3A;--charcoal:#1C1C1E;--gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;--white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;--gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;--border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--amber:#D97706;--sidebar-w:240px;--font-display:'DM Serif Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;--r-sm:8px;--r-md:12px;--r-lg:16px;--r-full:9999px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:var(--font-body);border:none;background:none}svg{display:block}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--charcoal);display:flex;flex-direction:column;z-index:100;transition:transform .28s}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:9px;padding:16px 14px 13px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none}
    .sb-logo-mark{width:28px;height:28px;border-radius:7px}
    .sb-logo-name{font-family:var(--font-display);font-size:15px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
    .sb-admin-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:var(--r-full);background:rgba(229,161,0,.15);color:var(--gold-bright);margin-left:auto}
    .sb-nav{flex:1;overflow-y:auto;padding:8px 6px;display:flex;flex-direction:column;gap:1px}
    .sb-sect{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.22);padding:10px 10px 3px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.52);transition:all .15s;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:16px;flex-shrink:0;opacity:.7}.sb-item.active .sb-ic,.sb-item:hover .sb-ic{opacity:1}
    .sb-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07)}
    .sb-admin-info{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .sb-admin-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),#8B6914);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
    .sb-admin-name{font-size:12px;font-weight:600;color:#fff}.sb-admin-role{font-size:10px;color:rgba(255,255,255,.3)}
    .sb-logout{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;transition:color .15s}.sb-logout:hover{color:#fff}
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}.sb-ov.show{display:block}
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{height:60px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,24px);gap:12px;position:sticky;top:0;z-index:50}
    .tb-ham{display:none;flex-direction:column;gap:4px;padding:4px}
    @media(max-width:960px){.tb-ham{display:flex}}
    .tb-ham span{display:block;width:18px;height:1.8px;background:var(--charcoal);border-radius:2px}
    .tb-title{font-family:var(--font-display);font-size:17px;color:var(--charcoal)}
    .tb-r{margin-left:auto}
    .tb-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),#8B6914);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .page{padding:clamp(16px,2.5vw,24px);flex:1}
    .page-hd{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
    .page-ttl{font-family:var(--font-display);font-size:clamp(20px,3vw,26px);color:var(--charcoal)}
    .page-sub{font-size:13px;color:var(--gray-400);margin-top:2px}
    .btn{padding:9px 16px;border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:var(--charcoal);color:#fff}.btn-primary:hover{background:#333}
    .btn-outline{background:var(--white);color:var(--charcoal);border:1.5px solid var(--border)}.btn-outline:hover{border-color:var(--charcoal)}
    .toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;margin-top:16px}
    .search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
    .search-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
    .search-inp{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;outline:none;transition:border-color .15s}
    .search-inp:focus{border-color:var(--charcoal)}
    .filter-sel,.form-input{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;background:var(--white);outline:none;cursor:pointer;width:100%}
    .filter-sel:focus,.form-input:focus{border-color:var(--charcoal)}
    .form-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;outline:none;resize:vertical;min-height:80px}
    .form-textarea:focus{border-color:var(--charcoal)}
    .form-label{font-size:12px;font-weight:700;color:var(--gray-800);margin-bottom:6px;display:block}
    .form-row{margin-bottom:14px}
    .panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
    .tbl-wrap{overflow-x:auto}
    .tbl{width:100%;border-collapse:collapse;min-width:600px}
    .tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gray-400);padding:11px 16px;text-align:left;border-bottom:1px solid var(--border);background:var(--gray-50);white-space:nowrap}
    .tbl td{font-size:13px;padding:12px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--gray-50)}
    .badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:var(--r-full);white-space:nowrap;display:inline-block}
    .b-active{background:var(--green-pale);color:var(--green)}.b-expired{background:#fef2f2;color:var(--red)}
    .act-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--gray-600);transition:all .15s}
    .act-btn:hover{border-color:var(--charcoal);color:var(--charcoal)}
    .act-btn.danger{color:var(--red);border-color:rgba(220,38,38,.25)}.act-btn.danger:hover{background:var(--red);color:#fff;border-color:var(--red)}
    .stat-box{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px}
    .stat-num{font-family:var(--font-display);font-size:26px;color:var(--charcoal);line-height:1}
    .stat-lbl{font-size:11px;color:var(--gray-400);margin-top:4px}
    .pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px}
    .pg-info{font-size:12px;color:var(--gray-400)}
    .pg-btns{display:flex;gap:4px}
    .pg-btn{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--gray-600);transition:all .15s}
    .pg-btn.active,.pg-btn:hover{background:var(--charcoal);color:#fff;border-color:var(--charcoal)}
    .overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
    .overlay.show{display:flex}
    .modal{background:var(--white);border-radius:var(--r-lg);padding:28px;max-width:500px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
    .modal-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;color:var(--gray-600);cursor:pointer;border:none}
    .modal-ttl{font-family:var(--font-display);font-size:19px;color:var(--charcoal);margin-bottom:16px}
    .modal-btns{display:flex;gap:8px;margin-top:16px}
    .mbtn{flex:1;padding:11px;border-radius:var(--r-sm);font-family:var(--font-body);font-size:13px;font-weight:700;border:none;cursor:pointer}
    .mbtn.primary{background:var(--charcoal);color:#fff}.mbtn.secondary{background:var(--gray-100);color:var(--charcoal)}
    /* Settings specific */
    .settings-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:22px}
    .sc-ttl{font-family:var(--font-display);font-size:16px;color:var(--charcoal);margin-bottom:4px}
    .sc-sub{font-size:13px;color:var(--gray-400);line-height:1.5;margin-bottom:4px}
    .toggle-list{display:flex;flex-direction:column;gap:0;margin-top:14px;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
    .trow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
    .trow:last-child{border-bottom:none}.trow:hover{background:var(--gray-50)}
    .trow-name{font-size:13px;font-weight:600;color:var(--charcoal)}
    .trow-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
    .tog{width:42px;height:24px;border-radius:12px;background:var(--gray-200);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
    .tog.on{background:var(--green)}
    .tog::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .tog.on::after{transform:translateX(18px)}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:480px){.form-row-2{grid-template-columns:1fr}}
    /* Blog toggle btn */
    .toggle-btn{padding:6px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--white);color:var(--gray-600);cursor:pointer;transition:all .15s}
    .toggle-btn.published{background:var(--green);border-color:var(--green);color:#fff}
  </style>
  <script src="/js/api.js"></script>
</head>

  <header class="topbar">
    <button class="tb-ham" id="hamBtn"><span></span><span></span><span></span></button>
    <div class="tb-title">Blog</div>
    <div class="tb-r"><div class="tb-av">PA</div></div>

<!-- Editor Modal -->
<div class="overlay" id="editorModal" style="align-items:flex-start">
  <div class="modal" style="max-width:640px;margin-top:20px">
    <button class="modal-close" onclick="closeModal(editorModal)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg></button>
    <div class="modal-ttl" id="editorTtl">New Blog Post</div>
    <div class="form-row"><label class="form-label">Title</label><input class="form-input" id="postTitle" placeholder="Post title..."/></div>
    <div class="form-row form-row-2">
      <div><label class="form-label">Category</label><select class="form-input" id="postCategory"><option value="post-utme">Post-UTME</option><option value="jamb">JAMB</option><option value="waec">WAEC</option><option value="study-tips">Study Tips</option><option value="news">News</option></select></div>
      <div><label class="form-label">Slug</label><input class="form-input" id="postSlug" placeholder="auto-generated"/></div>
    </div>
    <div class="form-row"><label class="form-label">Excerpt</label><input class="form-input" id="postExcerpt" placeholder="Short description for blog listing..."/></div>
    <div class="form-row"><label class="form-label">Cover Image URL <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input class="form-input" id="postCoverImage" placeholder="https://example.com/image.jpg" oninput="previewCover(this.value)"/><div id="coverPreview" style="margin-top:8px;display:none"><img id="coverImg" style="width:100%;max-height:160px;object-fit:cover;border-radius:8px;border:1px solid #E4E1DC"/></div></div>
    <div class="form-row"><label class="form-label">Content</label><textarea class="form-textarea" id="postContent" style="min-height:200px" placeholder="Write the post content here. HTML and Markdown supported."></textarea></div>
    <div class="form-row" style="display:flex;align-items:center;justify-content:space-between"><label class="form-label" style="margin:0">Published</label><button class="toggle-btn" id="publishToggle" onclick="togglePublish(this)">Draft</button></div>
    <div class="modal-btns" style="margin-top:14px"><button class="mbtn secondary" onclick="closeModal(editorModal)">Cancel</button><button class="mbtn primary" onclick="savePost()">Save Post</button></div>
  </div>
</div>

<script>
const sb=document.getElementById('sidebar'),ov=document.getElementById('sbOv'),ham=document.getElementById('hamBtn');
function closeSb(){sb.classList.remove('open');ov.classList.remove('show');document.body.style.overflow='';}
ham.addEventListener('click',()=>{const o=sb.classList.toggle('open');ov.classList.toggle('show',o);document.body.style.overflow=o?'hidden':'';});

function closeModal(el){el.classList.remove('show');}

/* Admin auth redirect helper */
function pxRedirectAdminLoginIfAuthFailed(res) {
  if (res && (res.status === 401 || res.status === 403)) {
    window.location.href = '/admin/login.html';
    return true;
  }
  return false;
}

function pxSafeText(v) {
  return v === null || v === undefined ? '' : String(v);
}

let PX_POSTS = [];
let pxCurrentPostId = null;

/* Toggle button for publish/draft */
function previewCover(url) {
  const preview = document.getElementById('coverPreview');
  const img = document.getElementById('coverImg');
  if (url && url.startsWith('http')) {
    img.src = url;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}
function togglePublish(btn){
  btn.classList.toggle('published');
  btn.textContent=btn.classList.contains('published')?'Published':'Draft';
}

function pxPostNormalise(p) {
  const id = p.id ?? p.postId ?? p._id ?? '';
  const title = p.title ?? '';
  const category = p.category ?? p.cat ?? '';
  const status = p.status ?? (p.published ? 'published' : 'draft');
  const slug = p.slug ?? p.slugText ?? '';
  const content = p.content ?? p.body ?? null;
  const excerpt = p.excerpt ?? null;
  const coverImage = p.coverImage ?? p.cover ?? p.image ?? null;
  const publishedAt = p.publishedAt ?? p.date ?? p.createdAt ?? null;
  return { id, title, category, status, slug, content, excerpt, coverImage, publishedAt };
}

function pxStatusBadge(status) {
  const s = String(status || '').toLowerCase();
  const published = s.includes('publish');
  return `<span class="badge" style="background:${published?'var(--green-pale)':'var(--gray-100)'};color:${published?'var(--green)':'var(--gray-600)'}">${published?'Published':'Draft'}</span>`;
}

function pxFormatPublishedDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (Number.isNaN(dt.getTime())) return pxSafeText(d);
  return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderBlogTable(list) {
  const tbody = document.getElementById('blogTbody');
  if (!tbody) return;

  tbody.innerHTML = (list || []).map(p => {
    const post = pxPostNormalise(p);
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${post.coverImage?`<img src="${post.coverImage}" style="width:40px;height:28px;object-fit:cover;border-radius:4px;flex-shrink:0">`:'<div style="width:40px;height:28px;background:var(--gray-100);border-radius:4px;flex-shrink:0"></div>'}<span style="font-weight:600">${pxSafeText(post.title)}</span></div></td>
      <td>${pxSafeText(post.category)}</td>
      <td>${pxStatusBadge(post.status)}</td>
      <td style="color:var(--gray-400)">${pxFormatPublishedDate(post.publishedAt)}</td>
      <td style="display:flex;gap:5px">
        <button class="act-btn" onclick="editPost('${post.id}')">Edit</button>
        <button class="act-btn danger" onclick="deletePost('${post.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function openEditor() {
  pxCurrentPostId = null;
  document.getElementById('editorTtl').textContent = 'New Blog Post';

  const titleEl = document.getElementById('postTitle');
  const slugEl = document.getElementById('postSlug');
  const publishBtn = document.getElementById('publishToggle');

  if (titleEl) titleEl.value = '';
  if (slugEl) slugEl.value = '';
  if (publishBtn) {
    publishBtn.classList.add('published');
    publishBtn.textContent = 'Published';
  }

  document.getElementById('postExcerpt').value = '';
  document.getElementById('postContent').value = '';
  document.getElementById('postCoverImage').value = '';
  document.getElementById('postCategory').value = 'post-utme';
  document.getElementById('coverPreview').style.display = 'none';

  document.getElementById('editorModal').classList.add('show');
}

async function editPost(id) {
  pxCurrentPostId = id;

  // Backend may not provide per-id GET; best-effort load all posts and find one
  const r = await fetch('/api/admin/blog', { method: 'GET', credentials: 'include' });
  if (pxRedirectAdminLoginIfAuthFailed(r)) return;

  const data = await r.json().catch(() => null);
  if (!r.ok || !data) return;

  const list = data.posts || data.data || data.results || data || [];
  const found = list.find(x => String(x.id ?? x.postId ?? x._id) === String(id));
  if (!found) return;

  const post = pxPostNormalise(found);

  document.getElementById('editorTtl').textContent = 'Edit Blog Post';
  document.getElementById('postTitle').value = post.title || '';
  document.getElementById('postSlug').value = post.slug || '';

  document.getElementById('postExcerpt').value = post.excerpt || '';
  document.getElementById('postContent').value = post.content || '';

  
  

  const publishBtn = document.getElementById('publishToggle');
  const published = String(post.status || '').toLowerCase().includes('publish');
  if (published) {
    publishBtn.classList.add('published');
    publishBtn.textContent = 'Published';
  } else {
    publishBtn.classList.remove('published');
    publishBtn.textContent = 'Draft';
  }

  document.getElementById('editorModal').classList.add('show');
}

async function savePost() {
  const payload = {
    title: document.getElementById('postTitle').value || '',
    slug: document.getElementById('postSlug').value || null,
    category: document.getElementById('postCategory').value || 'post-utme',
    excerpt: document.getElementById('postExcerpt').value || null,
    content: document.getElementById('postContent').value || '',
    coverImage: document.getElementById('postCoverImage').value || null,
    published: document.getElementById('publishToggle').classList.contains('published'),
  };

  try {
    const r = pxCurrentPostId
      ? await fetch(`/api/admin/blog/${pxCurrentPostId}`, {
          method: 'PATCH',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })
      : await fetch('/api/admin/blog', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

    const data = await r.json().catch(() => ({}));
    if (r.status === 401 || r.status === 403) return (window.location.href = '/admin/login.html');
    if (!r.ok) alert(data.error || 'Failed to save post.');
    else alert('Post saved.');

  } catch {
    alert('Network error while saving post.');
  } finally {
    document.getElementById('editorModal').classList.remove('show');
    await pxLoadBlog();
  }
}

async function deletePost(id) {
  if (!confirm('Delete this post? This cannot be undone.')) return;

  try {
    const r = await fetch(`/api/admin/blog/${id}`, {
      method: 'DELETE',
      credentials: 'include'
    });
    const data = await r.json().catch(() => ({}));
    if (r.status === 401 || r.status === 403) return (window.location.href = '/admin/login.html');
    if (!r.ok) alert(data.error || 'Failed to delete post.');
    else alert('Post deleted.');
  } catch {
    alert('Network error while deleting post.');
  } finally {
    await pxLoadBlog();
  }
}

async function pxLoadBlog() {
  const r = await fetch('/api/admin/blog', { method: 'GET', credentials: 'include' });
  if (pxRedirectAdminLoginIfAuthFailed(r)) return;

  const data = await r.json().catch(() => null);
  if (!r.ok || !data) return;

  const list = data.posts || data.data || data.results || data || [];
  PX_POSTS = Array.isArray(list) ? list : [];
  renderBlogTable(PX_POSTS);
}

async function initBlogPage() {
  await pxLoadBlog();
}

initBlogPage();
(async function initAdminBlog() {
  try {
    async function loadBlogPosts() {
      const data = await PX.adminGet('/blog');
      if (!data) return;
      const posts = data.posts || [];
      const tbody = document.getElementById('blogTbody');
      if (!tbody) return;
      if (posts.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--gray-400)">No blog posts yet. Create your first post.</td></tr>';
        return;
      }
      tbody.innerHTML = posts.map(p => {
        const statusBadge = p.published
          ? '<span class="badge" style="background:var(--green-pale);color:var(--green)">Published</span>'
          : '<span class="badge" style="background:var(--gray-100);color:var(--gray-600)">Draft</span>';
        const date = p.publishedAt
          ? new Date(p.publishedAt).toLocaleDateString('en-GB')
          : '—';
        return `<tr>
          <td style="font-weight:600">${p.title}</td>
          <td>${p.category}</td>
          <td>${statusBadge}</td>
          <td style="color:var(--gray-400)">${date}</td>
          <td><div class="act-btns">
            <button class="act-btn" data-action="edit" data-id="${p.id}">Edit</button>
            <button class="act-btn" data-action="toggle" data-id="${p.id}" data-published="${p.published}">${p.published ? 'Unpublish' : 'Publish'}</button>
            <button class="act-btn danger" data-action="delete" data-id="${p.id}">Delete</button>
          </div></td>
        </tr>`;
      }).join('');

      document.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const action = btn.dataset.action;
          if (action === 'delete') {
            if (confirm('Delete this post? This cannot be undone.')) {
              await PX.adminDel('/blog/' + id);
              showToast('Post deleted.', 'success');
              loadBlogPosts();
            }
          } else if (action === 'toggle') {
            const isPublished = btn.dataset.published === 'true';
            await PX.adminPatch('/blog/' + id, { published: !isPublished });
            showToast(isPublished ? 'Post unpublished.' : 'Post published.', 'success');
            loadBlogPosts();
          } else if (action === 'edit') {
            openEditor();
          }
        });
      });
    }

    loadBlogPosts();

    const savePostBtn = document.getElementById('editorModal')?.querySelector('.mbtn.primary');
    if (savePostBtn) {
      savePostBtn.addEventListener('click', async () => {
        const title = document.getElementById('postTitle')?.value;
        const slug = document.getElementById('postSlug')?.value;
        const category = document.getElementById('editorModal')?.querySelector('select')?.value;
        const excerpt = document.getElementById('editorModal')?.querySelector('input[placeholder*="description"]')?.value;
        const content = document.getElementById('editorModal')?.querySelector('textarea')?.value;
        const published = document.getElementById('publishToggle')?.classList.contains('published');
        if (!title) { showToast('Title is required.', 'error'); return; }
        const result = await PX.adminPost('/blog', { title, slug, category, excerpt, content, published });
        if (result && !result.error) {
          showToast('Post saved.', 'success');
          closeModal(document.getElementById('editorModal'));
          loadBlogPosts();
        } else {
          showToast(result?.error || 'Failed to save post.', 'error');
        }
      });
    }

    const titleInput = document.getElementById('postTitle');
    if (titleInput) {
      titleInput.addEventListener('input', () => {
        const slugEl = document.getElementById('postSlug');
        if (slugEl) slugEl.value = titleInput.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
      });
    }

  } catch(e) {
    console.error('Admin blog error:', e);
  }
})();
</script>
</body>
