<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Battle Results — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--navy-deep:#081729;--navy-light:#1e3f6e;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--green:#18A34A;--red:#DC2626;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--navy);color:#fff;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:rgba(229,161,0,.2)}
    a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:var(--font-body);border:none;background:none}svg{display:block}
    :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:4px}
    ::selection{background:rgba(229,161,0,.35);color:#fff}

    .res-top{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,3vw,28px);border-bottom:1px solid rgba(255,255,255,.08)}
    .res-logo{display:flex;align-items:center;gap:8px}
    .res-logo-mark{width:26px;height:26px;border-radius:6px;flex-shrink:0}
    .res-logo-name{font-family:var(--font-display);font-size:15px;color:#fff}
    .res-back{padding:9px 15px;min-height:38px;border-radius:var(--r-sm);background:rgba(255,255,255,.08);color:rgba(255,255,255,.65);font-size:12px;font-weight:600;transition:all .15s}
    .res-back:hover{background:rgba(255,255,255,.14);color:#fff}

    .wrap{max-width:560px;margin:0 auto;padding:clamp(22px,4vw,40px) 20px 60px}
    .screen-in{animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

    .skel{background:linear-gradient(90deg,rgba(255,255,255,.07) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.07) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* RESULT CARD */
    .result-box{background:var(--navy-mid);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:clamp(26px,5vw,36px) 26px;text-align:center;margin-bottom:18px}
    .result-icon{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;animation:resultPop .45s cubic-bezier(.22,1,.36,1)}
    @keyframes resultPop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
    .result-icon.win{background:rgba(24,163,74,.16);color:#4ade80;border:2px solid rgba(24,163,74,.35)}
    .result-icon.loss{background:rgba(220,38,38,.12);color:#fca5a5;border:2px solid rgba(220,38,38,.3)}
    .result-icon.draw{background:rgba(229,161,0,.14);color:var(--gold-bright);border:2px solid rgba(229,161,0,.32)}
    .result-title{font-family:var(--font-display);font-size:clamp(28px,6vw,34px);color:#fff;margin-bottom:6px}
    .result-sub{font-size:14px;color:rgba(255,255,255,.55);margin-bottom:8px;line-height:1.6}
    .result-meta{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:24px}
    .result-scores{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
    .result-score-card{border-radius:var(--r-md);padding:16px;text-align:center}
    .result-score-card.me{background:rgba(229,161,0,.1);border:1px solid rgba(229,161,0,.22)}
    .result-score-card.opp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
    .result-score-num{font-family:var(--font-display);font-size:38px;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
    .result-score-lbl{font-size:11px;color:rgba(255,255,255,.45);margin-top:5px}
    .result-pts-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:6px 14px;border-radius:var(--r-full);background:rgba(229,161,0,.15);color:var(--gold-bright);border:1px solid rgba(229,161,0,.25);margin-bottom:22px}
    .share-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
    .share-btn{display:inline-flex;align-items:center;gap:7px;padding:10px 16px;min-height:42px;border-radius:var(--r-sm);font-size:12.5px;font-weight:700;transition:all .15s;border:1.5px solid transparent}
    .share-btn.wa{background:rgba(37,211,102,.15);color:#4ade80;border-color:rgba(37,211,102,.3)}
    .share-btn.wa:hover{background:rgba(37,211,102,.25)}
    .share-btn.tw{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.2)}
    .share-btn.tw:hover{background:rgba(255,255,255,.18)}
    .result-btns{display:flex;flex-direction:column;gap:10px}
    .result-btn{padding:13px;min-height:48px;border-radius:var(--r-sm);font-size:14px;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center}
    .result-btn.primary{background:var(--gold);color:var(--navy)}
    .result-btn.primary:hover{background:var(--gold-bright)}
    .result-btn.secondary{background:rgba(255,255,255,.08);color:#fff}
    .result-btn.secondary:hover{background:rgba(255,255,255,.14)}

    /* REVIEW */
    .review-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-lg);padding:15px 18px;min-height:52px;color:#fff;font-size:14px;font-weight:700;transition:background .15s;margin-bottom:12px}
    .review-toggle:hover{background:rgba(255,255,255,.1)}
    .review-toggle svg{transition:transform .25s}
    .review-toggle[aria-expanded="true"] svg{transform:rotate(180deg)}
    .review-list{display:none}
    .review-list.show{display:block;animation:fadeUp .3s ease}
    .rev-q{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:var(--r-lg);padding:17px 18px;margin-bottom:10px}
    .rev-q-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
    .rev-q-num{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45)}
    .rev-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-full)}
    .rev-tag.right{background:rgba(24,163,74,.16);color:#4ade80}
    .rev-tag.wrong{background:rgba(220,38,38,.14);color:#fca5a5}
    .rev-q-text{font-size:14px;color:#fff;line-height:1.65;margin-bottom:10px}
    .rev-ans{font-size:12.5px;color:rgba(255,255,255,.65);line-height:1.6}
    .rev-ans b{color:#4ade80}
    .rev-ans .mine{color:#fca5a5}
    .rev-expl{font-size:12px;color:rgba(255,255,255,.5);line-height:1.65;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08)}

    /* ERROR */
    .err-box{text-align:center;padding:60px 20px}
    .err-icon{width:60px;height:60px;border-radius:16px;background:rgba(220,38,38,.14);border:1px solid rgba(220,38,38,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:#fca5a5}
    .err-h{font-family:var(--font-display);font-size:24px;margin-bottom:8px}
    .err-p{font-size:13.5px;color:rgba(255,255,255,.55);margin-bottom:22px}
    .err-btn{display:inline-flex;padding:12px 24px;min-height:46px;border-radius:var(--r-sm);background:var(--gold);color:var(--navy);font-size:13px;font-weight:700;align-items:center;transition:background .15s}
    .err-btn:hover{background:var(--gold-bright)}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:rgba(255,255,255,.14);backdrop-filter:blur(10px);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;max-width:380px;text-align:center;border:1px solid rgba(255,255,255,.2)}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
  <script src="/js/api.js"></script>
</head>
<body>
<div class="toast" id="toast"></div>
<canvas id="confetti" style="position:fixed;inset:0;z-index:50;pointer-events:none"></canvas>

<div class="res-top">
  <a href="battle.html" class="res-logo">
    <svg class="res-logo-mark" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#E5A100"/><path d="M7 10h12c4.8 0 8.5 3.8 8.5 8.5S23.8 27 19 27H7V10z" fill="#0B1F3A"/><circle cx="19" cy="18.5" r="3.2" fill="#E5A100"/></svg>
    <div class="res-logo-name">Prezidox</div>
  </a>
  <a href="battle.html" class="res-back" style="display:inline-flex;align-items:center">Back to Battle Mode</a>
</div>

<div class="wrap" id="content">
  <div class="skel" style="height:76px;width:76px;border-radius:50%;margin:0 auto 18px"></div>
  <div class="skel" style="height:30px;width:60%;margin:0 auto 12px"></div>
  <div class="skel" style="height:120px;margin-bottom:12px"></div>
  <div class="skel" style="height:48px"></div>
</div>

<script>
let PX_USER=null;
const REDUCE=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function el(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

const battleId=new URLSearchParams(location.search).get('id');

(async()=>{
  try{
    const r=await fetch('/api/auth/me',{credentials:'include'});
    if(!r.ok){window.location.href='/login.html';return;}
    const{user}=await r.json();
    PX_USER=user;
    if(!battleId){window.location.href='battle.html';return;}
    loadResult();
  }catch(e){window.location.href='/login.html';}
})();

async function loadResult(){
  let d=null;
  try{ d=await PX.get('/battles/'+encodeURIComponent(battleId)); }catch(e){}
  if(!d||!d.battle){ showError(); return; }
  const b=d.battle;
  if(b.status==='active'){window.location.href='battle-arena.html?id='+encodeURIComponent(battleId);return;}
  if(b.status==='pending'){window.location.href='battle-lobby.html?id='+encodeURIComponent(battleId);return;}
  render(b, d.questions||[], d.opponent);
}

function render(b, questions, opponent){
  const isChallenger=b.isChallenger!==false;
  const myScore=isChallenger?b.challengerScore:b.opponentScore;
  const theirScore=isChallenger?b.opponentScore:b.challengerScore;
  const isWin=b.winnerId===PX_USER.id;
  const isDraw=b.winnerId===null&&myScore!==null&&myScore===theirScore;
  const oppLabel=b.isAI?('AI ('+(b.aiLevel||'medium')+')'):(opponent?.name||'Opponent');
  const pts=isWin?50:isDraw?15:5;
  const date=b.completedAt?new Date(b.completedAt).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}):'';

  const trophy='<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 0 0 7.73 9.728M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M18.75 4.236c.982.143 1.954.317 2.916.52a6.003 6.003 0 0 1-5.395 4.972"/></svg>';
  const book='<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"/></svg>';
  const scales='<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 5.625c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125"/></svg>';
  const star='<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>';

  const cls=isDraw?'draw':isWin?'win':'loss';
  const icon=isDraw?scales:isWin?trophy:book;
  const title=isDraw?"It's a Draw!":isWin?'You Won!':'You Lost';
  const sub=isDraw?'Neck and neck. Rematch to break the tie.':isWin?'Outstanding performance. Battle points earned.':'Keep practicing. Every battle makes you stronger.';

  const shareText=isWin
    ?`I just won a ${b.subject} battle ${myScore}% to ${theirScore}% on Prezidox Academy. Who's next?`
    :`Just fought a ${b.subject} battle on Prezidox Academy (${myScore}% vs ${theirScore}%). Rematch me if you dare.`;
  const shareUrl='https://prezidox-academy-production.up.railway.app';

  // "Your answer" markers if we arrived straight from the arena
  let myAnswers=null;
  try{
    const cached=JSON.parse(sessionStorage.getItem('px_battle_answers_'+battleId)||'null');
    if(cached&&typeof cached==='object')myAnswers=cached;
  }catch(e){}

  const reviewable=questions.filter(q=>q.answer);
  const reviewHtml=reviewable.length?`
    <button class="review-toggle" id="revToggle" aria-expanded="false">
      <span>Review the questions (${reviewable.length})</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
    </button>
    <div class="review-list" id="revList">
      ${reviewable.map((q,i)=>{
        const mine=myAnswers?myAnswers[q.id]:undefined;
        const answered=mine!==undefined&&mine!==null;
        const right=answered&&mine===q.answer;
        const opts=q.options||{};
        return `<div class="rev-q">
          <div class="rev-q-head">
            <span class="rev-q-num">Question ${i+1}</span>
            ${answered?`<span class="rev-tag ${right?'right':'wrong'}">${right?'You got it':'You missed it'}</span>`:''}
          </div>
          <div class="rev-q-text">${esc(q.text)}</div>
          <div class="rev-ans">Correct answer: <b>${esc(q.answer)}. ${esc(opts[q.answer]||'')}</b>
            ${answered&&!right?`<span class="mine"> · Your answer: ${esc(mine)}. ${esc(opts[mine]||'')}</span>`:''}
          </div>
          ${q.explanation?`<div class="rev-expl">${esc(q.explanation)}</div>`:''}
        </div>`;
      }).join('')}
    </div>`:'';

  el('content').innerHTML=`<div class="screen-in">
    <div class="result-box">
      <div class="result-icon ${cls}">${icon}</div>
      <div class="result-title">${title}</div>
      <div class="result-sub">${sub}</div>
      <div class="result-meta">${esc(b.subject)} · ${b.questionCount} questions · vs ${esc(oppLabel)}${date?' · '+date:''}</div>
      <div class="result-scores">
        <div class="result-score-card me"><div class="result-score-num" id="myFinal">0%</div><div class="result-score-lbl">Your Score</div></div>
        <div class="result-score-card opp"><div class="result-score-num" id="oppFinal">0%</div><div class="result-score-lbl">${esc(oppLabel)}</div></div>
      </div>
      <div class="result-pts-badge">${star} +${pts} Battle Points</div>
      <div class="share-row">
        <a class="share-btn wa" target="_blank" rel="noopener noreferrer" href="https://wa.me/?text=${encodeURIComponent(shareText+' '+shareUrl)}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
        <a class="share-btn tw" target="_blank" rel="noopener noreferrer" href="https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent(shareUrl)}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Post on X
        </a>
      </div>
      <div class="result-btns">
        <a class="result-btn primary" href="battle-setup.html?subject=${encodeURIComponent(b.subject||'')}">Rematch — Same Subject</a>
        <a class="result-btn secondary" href="battle.html">Back to Battle Mode</a>
        <a class="result-btn secondary" href="battle-history.html">View Battle History</a>
      </div>
    </div>
    ${reviewHtml}
  </div>`;

  // Staggered count-up
  countUp(el('myFinal'), myScore, 200);
  countUp(el('oppFinal'), theirScore, 500);
  if(isWin&&!REDUCE)setTimeout(startConfetti,600);

  const rt=el('revToggle');
  if(rt)rt.addEventListener('click',()=>{
    const open=rt.getAttribute('aria-expanded')==='true';
    rt.setAttribute('aria-expanded',String(!open));
    el('revList').classList.toggle('show',!open);
  });
}

function countUp(node,target,delay){
  if(!node)return;
  if(target==null){node.textContent='--%';return;}
  if(REDUCE||target===0){node.textContent=target+'%';return;}
  node.textContent='0%';
  setTimeout(()=>{
    const dur=900,start=performance.now();
    (function frame(now){
      const p=Math.min((now-start)/dur,1),eased=1-Math.pow(1-p,3);
      node.textContent=Math.round(target*eased)+'%';
      if(p<1)requestAnimationFrame(frame);
    })(performance.now());
  },delay);
}

function startConfetti(){
  const canvas=el('confetti');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const colors=['#E5A100','#18A34A','#F5B800','#DC2626','#7c3aed','#fff'];
  const particles=Array.from({length:100},()=>({
    x:Math.random()*canvas.width,y:-10-Math.random()*100,
    w:8+Math.random()*8,h:4+Math.random()*4,
    color:colors[Math.floor(Math.random()*colors.length)],
    rot:Math.random()*360,vx:(Math.random()-.5)*4,vy:2+Math.random()*4,vr:(Math.random()-.5)*8,
  }));
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,1-frame/120);
      ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;
    });
    frame++;
    if(frame<150)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
}

function showError(){
  el('content').innerHTML=`<div class="err-box screen-in">
    <div class="err-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg></div>
    <div class="err-h">Battle not found</div>
    <div class="err-p">This battle may have expired or you don't have access to it.</div>
    <a href="battle.html" class="err-btn">Back to Battle Mode</a>
  </div>`;
}

let tTimer;
function showToast(msg){const t=el('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),3000);}
</script>
