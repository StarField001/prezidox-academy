<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Battle Arena — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--charcoal:#1C1C1E;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;
      --gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;
      --border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--amber:#D97706;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --shadow-md:0 4px 20px rgba(11,31,58,.10);
      --shadow-lg:0 8px 40px rgba(11,31,58,.13);
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--navy);color:var(--gray-800);-webkit-font-smoothing:antialiased;min-height:100vh}
    button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
    svg{display:block}

    /* ARENA TOPBAR */
    .arena-top{display:flex;align-items:center;justify-content:space-between;padding:14px clamp(16px,3vw,28px);border-bottom:1px solid rgba(255,255,255,.08)}
    .arena-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .arena-logo-mark{width:26px;height:26px;border-radius:6px;flex-shrink:0}
    .arena-logo-name{font-family:var(--font-display);font-size:15px;color:#fff}
    .arena-subject{font-size:12px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.04em}
    .arena-exit{padding:7px 14px;border-radius:var(--r-sm);background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);font-size:12px;font-weight:600;transition:all .15s}
    .arena-exit:hover{background:rgba(255,255,255,.14);color:#fff}

    /* SCOREBOARD */
    .scoreboard{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding:20px clamp(16px,3vw,28px);background:rgba(0,0,0,.2)}
    .player-side{display:flex;flex-direction:column}
    .player-side.right{align-items:flex-end;text-align:right}
    .player-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:var(--font-display);flex-shrink:0}
    .player-av.me{background:linear-gradient(135deg,var(--gold-deep),var(--navy-mid))}
    .player-av.opp{background:linear-gradient(135deg,var(--red),#7f1d1d)}
    .player-av.ai{background:linear-gradient(135deg,#7c3aed,#4c1d95)}
    .player-info{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .player-side.right .player-info{flex-direction:row-reverse}
    .player-name{font-size:13px;font-weight:600;color:#fff}
    .player-you{font-size:9px;font-weight:700;padding:2px 6px;border-radius:var(--r-full);background:var(--gold);color:var(--charcoal)}
    .player-score{font-family:var(--font-display);font-size:32px;color:#fff;line-height:1}
    .player-prog{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
    .vs-badge{font-family:var(--font-display);font-size:18px;color:rgba(255,255,255,.3);text-align:center;padding:8px}
    .q-progress{text-align:center}
    .q-progress-num{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:4px}
    .q-progress-bar{height:3px;background:rgba(255,255,255,.1);border-radius:var(--r-full);overflow:hidden;width:80px;margin:0 auto}
    .q-progress-fill{height:100%;width:100%;background:var(--gold);border-radius:var(--r-full);transform:scaleX(0);transform-origin:left;transition:transform .3s ease}

    /* OPPONENT LIVE STATUS */
    .opp-status{display:inline-flex;align-items:center;gap:6px}
    .opp-status .dots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:currentColor;margin-right:2px;animation:blinkDot 1.4s infinite both}
    .opp-status .dots span:nth-child(2){animation-delay:.2s}
    .opp-status .dots span:nth-child(3){animation-delay:.4s}
    @keyframes blinkDot{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .lead-chip{display:none;align-items:center;gap:7px;margin:0 auto 16px;width:fit-content;max-width:100%;padding:7px 15px;border-radius:var(--r-full);font-size:12px;font-weight:700;border:1px solid transparent}
    .lead-chip.show{display:flex}
    .lead-chip.ahead{background:rgba(24,163,74,.14);color:#4ade80;border-color:rgba(24,163,74,.3)}
    .lead-chip.behind{background:rgba(220,38,38,.12);color:#fca5a5;border-color:rgba(220,38,38,.28)}
    .lead-chip.tied{background:rgba(229,161,0,.12);color:var(--gold-bright);border-color:rgba(229,161,0,.28)}

    /* QUESTION AREA */
    .arena-body{padding:clamp(16px,3vw,28px);max-width:680px;margin:0 auto}
    .q-timer-wrap{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .q-num-badge{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.5);padding:4px 10px;border-radius:var(--r-full);background:rgba(255,255,255,.08)}
    .q-timer{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:rgba(255,255,255,.7)}
    .q-timer.warning{color:var(--gold-bright)}
    .q-timer.danger{color:#fca5a5;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .q-timer-icon{width:14px;height:14px;flex-shrink:0}

    .q-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r-xl);padding:28px;margin-bottom:20px}
    .q-text{font-size:clamp(15px,2.5vw,17px);color:#fff;line-height:1.7;font-weight:500}

    .options-grid{display:flex;flex-direction:column;gap:10px}
    .option-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:var(--r-lg);border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#fff;font-size:14px;font-weight:500;text-align:left;transition:all .15s;cursor:pointer}
    .option-btn:hover:not(:disabled){border-color:rgba(255,255,255,.3);background:rgba(255,255,255,.08)}
    .option-btn:disabled{cursor:default}
    .option-btn.correct{border-color:var(--green);background:rgba(24,163,74,.15);color:#fff}
    .option-btn.wrong{border-color:var(--red);background:rgba(220,38,38,.12);color:rgba(255,255,255,.7)}
    .option-btn.reveal{border-color:var(--green);background:rgba(24,163,74,.1)}
    .opt-letter{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.1);transition:all .15s}
    .option-btn.correct .opt-letter{background:var(--green)}
    .option-btn.wrong .opt-letter{background:var(--red)}
    .option-btn.reveal .opt-letter{background:var(--green)}

    .next-btn{width:100%;padding:14px;border-radius:var(--r-sm);background:var(--gold);color:var(--charcoal);font-size:14px;font-weight:700;font-family:var(--font-body);transition:all .15s;margin-top:14px;display:none}
    .next-btn:hover{background:var(--gold-bright)}

    /* RESULT OVERLAY */
    .result-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(11,31,58,.95);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}
    .result-overlay.show{display:flex}
    .result-box{background:var(--navy-mid);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-xl);padding:36px 28px;max-width:480px;width:100%;text-align:center;position:relative}
    .result-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;animation:resultPop .45s cubic-bezier(.22,1,.36,1)}
    @keyframes resultPop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
    .result-icon.win{background:rgba(24,163,74,.16);color:#4ade80;border:2px solid rgba(24,163,74,.35)}
    .result-icon.loss{background:rgba(220,38,38,.12);color:#fca5a5;border:2px solid rgba(220,38,38,.3)}
    .result-icon.draw{background:rgba(229,161,0,.14);color:var(--gold-bright);border:2px solid rgba(229,161,0,.32)}
    .result-title{font-family:var(--font-display);font-size:32px;color:#fff;margin-bottom:8px}
    .result-sub{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:28px;line-height:1.6}
    .result-scores{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
    .result-score-card{border-radius:var(--r-md);padding:16px;text-align:center}
    .result-score-card.me{background:rgba(229,161,0,.1);border:1px solid rgba(229,161,0,.2)}
    .result-score-card.opp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
    .result-score-num{font-family:var(--font-display);font-size:36px;color:#fff;line-height:1}
    .result-score-lbl{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
    .result-pts-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r-full);background:rgba(229,161,0,.15);color:var(--gold-bright);border:1px solid rgba(229,161,0,.2);margin-bottom:20px}
    .result-btns{display:flex;flex-direction:column;gap:10px}
    .result-btn{padding:13px;border-radius:var(--r-sm);font-size:14px;font-weight:700;font-family:var(--font-body);transition:all .15s}
    .result-btn.primary{background:var(--gold);color:var(--charcoal)}
    .result-btn.primary:hover{background:var(--gold-bright)}
    .result-btn.secondary{background:rgba(255,255,255,.08);color:#fff}
    .result-btn.secondary:hover{background:rgba(255,255,255,.14)}

    /* LOADING */
    .arena-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:rgba(255,255,255,.5);font-size:14px}
    .spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;max-width:380px;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:4px}
    .kbd-hint{font-size:11px;color:rgba(255,255,255,.3);text-align:center;margin-top:12px;display:none}
    @media(min-width:960px){.kbd-hint{display:block}}
    .kbd-hint b{display:inline-block;padding:1px 6px;border:1px solid rgba(255,255,255,.2);border-radius:4px;font-weight:600;color:rgba(255,255,255,.55)}
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
    }
  </style>
  <script src="/js/api.js"></script>
  <meta name="robots" content="noindex"/>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- TOPBAR -->
<div class="arena-top">
  <a href="battle.html" class="arena-logo">
    <svg class="arena-logo-mark" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="8" fill="#E5A100"/><path d="M7 10h12c4.8 0 8.5 3.8 8.5 8.5S23.8 27 19 27H7V10z" fill="#0B1F3A"/><circle cx="19" cy="18.5" r="3.2" fill="#E5A100"/></svg>
    <div class="arena-logo-name">Prezidox</div>
  </a>
  <div class="arena-subject" id="arenaSubject">Loading...</div>
  <button class="arena-exit" onclick="confirmExit()">Exit Battle</button>
</div>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="player-side">
    <div class="player-info">
      <div class="player-av me" id="myAv">--</div>
      <div>
        <div class="player-name" id="myName">You</div>
        <span class="player-you">You</span>
      </div>
    </div>
    <div class="player-score" id="myScore">0%</div>
    <div class="player-prog" id="myProg">0 of 0 answered</div>
  </div>
  <div class="q-progress">
    <div class="q-progress-num" id="qProgressNum">0 / 0</div>
    <div class="q-progress-bar"><div class="q-progress-fill" id="qProgressFill" style="width:0%"></div></div>
    <div class="vs-badge">VS</div>
  </div>
  <div class="player-side right">
    <div class="player-info">
      <div class="player-av" id="oppAvClass"><span id="oppAv">AI</span></div>
      <div>
        <div class="player-name" id="oppName">Opponent</div>
      </div>
    </div>
    <div class="player-score" id="oppScore">--</div>
    <div class="player-prog" id="oppProg">Waiting...</div>
  </div>
</div>
<div style="padding:12px clamp(16px,3vw,28px) 0">
  <div class="lead-chip" id="leadChip" aria-live="polite"></div>
</div>

<!-- BODY -->
<div class="arena-body" id="arenaBody">
  <div class="arena-loading">
    <div class="spinner"></div>
    Loading battle...
  </div>
</div>

<script>
/* ═══ STATE ═══ */
let battleData = null;
let questions = [];
let currentQ = 0;
let answers = {};
let correctCount = 0;
let questionStartTime = null;
let timerInterval = null;
let battleId = null;
let submitted = false;
let answerLocked = false;
let oppPollInterval = null;
let aiPaceTimer = null;
let aiProgress = 0;
let oppFinishedScore = null;
let baseAnswered = 0;
const REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ═══ INIT ═══ */
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials:'include' });
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const { user } = await res.json();
    window.PX_USER = user;
    const initials = ((user.firstName||'')[0]+(user.lastName||'')[0]).toUpperCase();
    document.getElementById('myAv').textContent = initials;
    document.getElementById('myName').textContent = user.firstName;
  } catch(e) { window.location.href = '/login.html'; }
})();

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  battleId = params.get('id');
  if (!battleId) { window.location.href = 'battle.html'; return; }
  await loadBattle();
});

async function loadBattle() {
  try {
    const d = await PX.get(`/battles/${battleId}`);
    battleData = d.battle;
    questions = d.questions || [];

    document.getElementById('arenaSubject').textContent = battleData.subject + ' · ' + battleData.questionCount + ' Qs';

    // Opponent display
    const opp = d.opponent;
    if (opp) {
      document.getElementById('oppName').textContent = opp.name;
      const oppAvEl = document.getElementById('oppAvClass');
      oppAvEl.className = 'player-av ' + (opp.isAI ? 'ai' : 'opp');
      document.getElementById('oppAv').textContent = opp.isAI ? 'AI' : (opp.name||'?').charAt(0).toUpperCase();
    }

    // Check if already completed — results page owns the reveal
    if (battleData.status === 'completed') {
      window.location.replace('battle-results.html?id=' + encodeURIComponent(battleId));
      return;
    }

    // Check how many already answered
    if (d.myAnswered > 0) {
      currentQ = d.myAnswered;
      baseAnswered = d.myAnswered;
      correctCount = Math.round((d.myScore || 0) / 100 * battleData.questionCount);
    }

    if (currentQ >= questions.length) {
      // Already answered all — wait for result
      waitForResult();
      return;
    }

    updateScoreboard();
    renderQuestion();
    startOpponentTracking();
  } catch(e) {
    document.getElementById('arenaBody').innerHTML = `<div class="arena-loading"><div style="color:rgba(255,255,255,.5);font-size:14px">Failed to load battle. <a href="battle.html" style="color:var(--gold)">Go back</a></div></div>`;
  }
}

/* ═══ OPPONENT LIVE TRACKING ═══ */
function startOpponentTracking() {
  if (!battleData || battleData.status !== 'active') return;
  if (battleData.isAI) {
    // Visible AI pacing + thinking indicator (spec). The AI's real score is computed server-side at completion.
    const pace = battleData.aiLevel === 'hard' ? [5000,9000] : battleData.aiLevel === 'easy' ? [11000,17000] : [8000,13000];
    updateOppStatus();
    (function scheduleAI(){
      if (submitted || aiProgress >= questions.length) return;
      aiPaceTimer = setTimeout(() => {
        aiProgress = Math.min(aiProgress + 1, questions.length);
        updateOppStatus();
        scheduleAI();
      }, pace[0] + Math.random() * (pace[1] - pace[0]));
    })();
  } else {
    // Human opponent: poll for their finished score (server exposes it once they complete)
    oppPollInterval = setInterval(async () => {
      if (submitted) { clearInterval(oppPollInterval); return; }
      try {
        const d = await PX.get(`/battles/${battleId}`);
        const theirScore = d.battle.isChallenger ? d.battle.opponentScore : d.battle.challengerScore;
        if (theirScore !== null && theirScore !== undefined) {
          oppFinishedScore = theirScore;
          clearInterval(oppPollInterval);
          updateOppStatus();
        }
        if (d.battle.status === 'completed' && !submitted) {
          clearInterval(oppPollInterval);
        }
      } catch(e) {}
    }, 5000);
  }
}

function updateOppStatus() {
  const prog = document.getElementById('oppProg');
  const chip = document.getElementById('leadChip');
  if (!prog) return;
  if (battleData?.isAI) {
    if (aiProgress >= questions.length) {
      prog.innerHTML = '<span class="opp-status">Finished — waiting for you</span>';
    } else {
      prog.innerHTML = `<span class="opp-status">${aiProgress} of ${questions.length} · thinking<span class="dots"><span></span><span></span><span></span></span></span>`;
    }
    return;
  }
  if (oppFinishedScore !== null) {
    prog.textContent = `Finished · ${oppFinishedScore}%`;
    document.getElementById('oppScore').textContent = oppFinishedScore + '%';
    updateLeadChip();
  } else {
    prog.innerHTML = '<span class="opp-status">In progress<span class="dots"><span></span><span></span><span></span></span></span>';
  }
}

function updateLeadChip() {
  const chip = document.getElementById('leadChip');
  if (!chip || oppFinishedScore === null || submitted) return;
  const myPct = questions.length > 0 ? Math.round((correctCount / questions.length) * 100) : 0;
  const diff = myPct - oppFinishedScore;
  chip.classList.add('show');
  if (diff > 0) { chip.className = 'lead-chip show ahead'; chip.textContent = `You're ahead by ${diff} point${diff!==1?'s':''} — hold the lead`; }
  else if (diff < 0) { chip.className = 'lead-chip show behind'; chip.textContent = `Opponent leads by ${Math.abs(diff)} point${Math.abs(diff)!==1?'s':''} — every answer counts`; }
  else { chip.className = 'lead-chip show tied'; chip.textContent = 'Dead level — next correct answer takes the lead'; }
}

/* ═══ RENDER QUESTION ═══ */
function renderQuestion() {
  if (currentQ >= questions.length) {
    submitAll();
    return;
  }
  const q = questions[currentQ];
  const opts = Object.entries(q.options || {});
  const letters = ['A','B','C','D','E'];
  answerLocked = false;

  document.getElementById('arenaBody').innerHTML = `
    <div class="q-timer-wrap">
      <span class="q-num-badge">Question ${currentQ+1} of ${questions.length}</span>
      <div class="q-timer" id="qTimer">
        <svg class="q-timer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>
        <span id="timerDisplay">60</span>s
      </div>
    </div>
    <div class="q-card">
      <div class="q-text">${esc(q.text)}</div>
    </div>
    <div class="options-grid" id="optionsGrid">
      ${opts.map(([k,v],i) => `
        <button class="option-btn" id="opt_${esc(k)}" data-qid="${esc(q.id)}" data-key="${esc(k)}">
          <div class="opt-letter">${letters[i]||esc(k)}</div>
          <span>${esc(v)}</span>
        </button>
      `).join('')}
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
      ${currentQ + 1 < questions.length ? 'Next Question' : 'Finish Battle'}
    </button>
    <p class="kbd-hint">Answer with <b>A</b><b>B</b><b>C</b><b>D</b> keys · <b>Enter</b> for next</p>
  `;

  document.getElementById('optionsGrid').addEventListener('click', e => {
    const btn = e.target.closest('.option-btn');
    if (btn && !answerLocked) selectAnswer(btn.dataset.qid, btn.dataset.key);
  });

  questionStartTime = Date.now();
  startTimer(60);
}

/* ═══ TIMER ═══ */
function startTimer(seconds) {
  clearInterval(timerInterval);
  let remaining = seconds;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(() => {
    remaining--;
    updateTimerDisplay(remaining);
    if (remaining <= 0) {
      clearInterval(timerInterval);
      // Time's up — unanswered counts as wrong (server never reveals answers mid-battle)
      const q = questions[currentQ];
      if (!answers[q.id]) {
        answerLocked = true;
        answers[q.id] = { selected: null, isCorrect: false };
        document.querySelectorAll('.option-btn').forEach(b => { b.disabled = true; });
        showToast("Time's up — moving on.");
        setTimeout(nextQuestion, 1200);
      }
    }
  }, 1000);
}

function updateTimerDisplay(s) {
  const el = document.getElementById('qTimer');
  const disp = document.getElementById('timerDisplay');
  if (!el || !disp) return;
  disp.textContent = s;
  el.className = 'q-timer' + (s <= 10 ? ' danger' : s <= 20 ? ' warning' : '');
}

/* ═══ ANSWER ═══ */
async function selectAnswer(questionId, selected) {
  const q = questions[currentQ];
  if (answers[q.id] || answerLocked) return;
  answerLocked = true;
  clearInterval(timerInterval);
  const timeTaken = Math.floor((Date.now() - questionStartTime) / 1000);

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  let res = null;
  try {
    res = await PX.post(`/battles/${battleId}/answer`, { questionId, answer: selected, timeTaken });
  } catch(e) {}

  if (!res || res.isCorrect === undefined) {
    // Network failed — unlock and let the student retry; restart the clock from where it stopped
    document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
    answerLocked = false;
    questionStartTime = Date.now() - timeTaken * 1000;
    startTimer(Math.max(5, 60 - timeTaken));
    showToast('Connection hiccup — tap your answer again.');
    return;
  }

  const isCorrect = res.isCorrect;
  const correctAnswer = res.correct;
  answers[q.id] = { selected, isCorrect };
  if (isCorrect) correctCount++;

  document.querySelectorAll('.option-btn').forEach(btn => {
    const k = btn.dataset.key;
    if (k === selected && isCorrect) btn.classList.add('correct');
    else if (k === selected && !isCorrect) btn.classList.add('wrong');
    else if (k === correctAnswer) btn.classList.add('reveal');
  });

  updateScoreboard();
  updateLeadChip();
  const nb = document.getElementById('nextBtn');
  nb.style.display = 'block';
  nb.focus({ preventScroll: true });
}

/* ═══ NEXT ═══ */
function nextQuestion() {
  clearInterval(timerInterval);
  currentQ++;
  updateScoreboard();
  if (currentQ >= questions.length) {
    submitAll();
  } else {
    renderQuestion();
  }
}

/* ═══ SCOREBOARD ═══ */
function updateScoreboard() {
  const myPct = questions.length > 0 ? Math.round((correctCount / questions.length) * 100) : 0;
  const answeredCount = Math.min(baseAnswered + Object.keys(answers).length, questions.length);
  document.getElementById('myScore').textContent = myPct + '%';
  document.getElementById('myProg').textContent = `${answeredCount} of ${questions.length} answered`;
  document.getElementById('qProgressNum').textContent = `${Math.min(currentQ+1, questions.length)} / ${questions.length}`;
  const pct = Math.min(currentQ, questions.length) / Math.max(questions.length, 1);
  document.getElementById('qProgressFill').style.transform = `scaleX(${pct})`;
}

/* ═══ SUBMIT ALL ═══ */
async function submitAll() {
  if (submitted) return;
  submitted = true;
  document.getElementById('arenaBody').innerHTML = `<div class="arena-loading"><div class="spinner"></div>Submitting your answers...</div>`;
  // Hand my picks to the results page so it can mark right/wrong in the review
  try {
    const mine = {};
    Object.keys(answers).forEach(qid => { mine[qid] = answers[qid].selected; });
    sessionStorage.setItem('px_battle_answers_' + battleId, JSON.stringify(mine));
  } catch(e) {}

  try {
    const res = await PX.post(`/battles/${battleId}/complete`, {});
    if (res.completed) {
      window.location.replace('battle-results.html?id=' + encodeURIComponent(battleId));
    } else {
      waitForResult();
    }
  } catch(e) {
    document.getElementById('arenaBody').innerHTML = `<div class="arena-loading"><div style="font-size:13px;color:rgba(255,255,255,.5)">Error submitting. <a href="battle.html" style="color:var(--gold)">Go back</a></div></div>`;
  }
}

/* ═══ WAIT FOR RESULT ═══ */
function waitForResult() {
  document.getElementById('arenaBody').innerHTML = `
    <div class="arena-loading">
      <div class="spinner"></div>
      <div style="text-align:center">
        <div style="font-size:15px;font-weight:600;color:#fff;margin-bottom:6px">Waiting for opponent</div>
        <div style="font-size:13px;color:rgba(255,255,255,.4)">Your answers are submitted. Hang tight...</div>
      </div>
    </div>`;

  let polls = 0;
  const poll = setInterval(async () => {
    polls++;
    if (polls > 60) { clearInterval(poll); return; }
    try {
      const d = await PX.get(`/battles/${battleId}`);
      if (d.battle.status === 'completed') {
        clearInterval(poll);
        window.location.replace('battle-results.html?id=' + encodeURIComponent(battleId));
      }
    } catch(e) {}
  }, 3000);
}

function confirmExit() {
  if (currentQ > 0 && currentQ < questions.length && !submitted) {
    if (confirm('Leave the battle? Your progress will be lost.')) {
      window.location.href = 'battle.html';
    }
  } else {
    window.location.href = 'battle.html';
  }
}

/* ═══ TOAST ═══ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}

/* ═══ KEYBOARD ═══ */
document.addEventListener('keydown', e => {
  if (e.target.matches('input,textarea,select')) return;
  if (e.key === 'Escape') { confirmExit(); return; }
  if (submitted || !questions.length || currentQ >= questions.length) return;
  const q = questions[currentQ];
  if (answers[q.id] && e.key === 'Enter') { e.preventDefault(); nextQuestion(); return; }
  if (answerLocked || answers[q.id]) return;
  const keys = Object.keys(q.options || {});
  const letters = ['a','b','c','d','e'];
  const idx = letters.indexOf(e.key.toLowerCase());
  if (idx >= 0 && keys[idx]) { e.preventDefault(); selectAnswer(q.id, keys[idx]); }
});
</script>
