<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Exam Results — Prezidox Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0B1F3A;--navy-mid:#132c52;--navy-light:#1e3f6e;--charcoal:#1C1C1E;--gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;--white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;--gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;--border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--red-pale:#FEF2F2;--amber:#D97706;--sidebar-w:252px;--topbar-h:62px;--font-display:'DM Serif Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;--shadow-md:0 4px 20px rgba(11,31,58,.10);--shadow-lg:0 8px 40px rgba(11,31,58,.13);--r-sm:8px;--r-md:12px;--r-lg:18px;--r-full:9999px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:var(--font-body);border:none;background:none}svg{display:block}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--navy);display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none;flex-shrink:0}
    .sb-logo-mark{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .sb-logo-name{font-family:var(--font-display);font-size:16px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:block}
    .sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
    .sb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.24);padding:12px 10px 4px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.56);transition:all .15s;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:17px;flex-shrink:0;display:flex;align-items:center}
    .sb-user{padding:11px 13px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .sb-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:rgba(255,255,255,.32)}
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);z-index:99;backdrop-filter:blur(2px)}
    .sb-ov.show{display:block}
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,26px);gap:12px;box-shadow:0 1px 4px rgba(11,31,58,.06)}
    .topbar-ham{display:none;flex-direction:column;gap:4px;padding:4px;flex-shrink:0}
    @media(max-width:960px){.topbar-ham{display:flex}}
    .topbar-ham span{display:block;width:19px;height:1.8px;background:var(--navy);border-radius:2px}
    .topbar-ttl{font-family:var(--font-display);font-size:17px;color:var(--navy)}
    .topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-decoration:none}
    .page{padding:clamp(16px,3vw,26px);flex:1;max-width:760px}

    /* SCORE HERO */
    .score-hero{text-align:center;margin-bottom:32px}
    .score-ring-wrap{position:relative;width:160px;height:160px;margin:0 auto 20px}
    .score-ring-svg{transform:rotate(-90deg)}
    .score-ring-track{fill:none;stroke:var(--gray-100);stroke-width:8}
    .score-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s ease}
    .score-ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
    .score-pct{font-family:var(--font-display);font-size:46px;color:var(--navy);line-height:1}
    .score-pct-lbl{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-400);margin-top:2px}
    .score-title{font-family:var(--font-display);font-size:clamp(18px,3vw,24px);color:var(--navy);margin-bottom:8px}
    .score-subtitle{font-size:14px;color:var(--gray-600);line-height:1.6;max-width:420px;margin:0 auto 14px}
    .grade-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--r-full);font-size:12px;font-weight:700}
    .grade-excellent{background:var(--green-pale);color:var(--green);border:1px solid rgba(24,163,74,.2)}
    .grade-good{background:var(--green-pale);color:var(--green);border:1px solid rgba(24,163,74,.2)}
    .grade-average{background:#fffbeb;color:var(--amber);border:1px solid rgba(217,119,6,.2)}
    .grade-needs-work{background:var(--red-pale);color:var(--red);border:1px solid rgba(220,38,38,.2)}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
    @media(min-width:540px){.stats-row{grid-template-columns:repeat(4,1fr)}}
    .stat-box{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);padding:16px;text-align:center}
    .stat-num{font-family:var(--font-display);font-size:26px;color:var(--navy);line-height:1}
    .stat-lbl{font-size:11px;color:var(--gray-400);margin-top:5px;font-weight:500}

    /* CUTOFF BANNER */
    .cutoff-banner{border-radius:var(--r-lg);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .cutoff-banner.pass{background:var(--green-pale);border:1px solid rgba(24,163,74,.2)}
    .cutoff-banner.fail{background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.2)}
    .cutoff-icon{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .cutoff-banner.pass .cutoff-icon{background:rgba(24,163,74,.15);color:var(--green)}
    .cutoff-banner.fail .cutoff-icon{background:rgba(217,119,6,.15);color:var(--amber)}
    .cutoff-text{font-size:14px;line-height:1.5}
    .cutoff-banner.pass .cutoff-text{color:var(--green)}
    .cutoff-banner.fail .cutoff-text{color:var(--amber)}

    /* POINTS */
    .pts-earned{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--navy),var(--navy-mid));border-radius:var(--r-lg);padding:16px 20px;margin-bottom:24px}
    .pts-ic{width:42px;height:42px;border-radius:10px;background:rgba(229,161,0,.14);border:1px solid rgba(229,161,0,.2);display:flex;align-items:center;justify-content:center;color:var(--gold-bright);flex-shrink:0}
    .pts-num{font-family:var(--font-display);font-size:22px;color:#fff;line-height:1}
    .pts-lbl{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}

    /* ACTIONS */
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px}
    .act-btn{padding:11px 22px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:none}
    .act-btn.primary{background:var(--navy);color:#fff}
    .act-btn.primary:hover{background:var(--navy-mid)}
    .act-btn.secondary{background:var(--white);color:var(--navy);border:1.5px solid var(--border)}
    .act-btn.secondary:hover{border-color:var(--navy)}
    .act-btn.gold{background:var(--gold);color:var(--charcoal)}
    .act-btn.gold:hover{background:var(--gold-bright)}

    /* SUBJECT BREAKDOWN */
    .panel{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:20px}
    .ph{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border)}
    .ph-ttl{font-family:var(--font-display);font-size:15px;color:var(--navy)}
    .subj-row{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border)}
    .subj-row:last-child{border-bottom:none}
    .subj-name{font-size:13px;font-weight:600;color:var(--navy);width:140px;flex-shrink:0}
    .subj-bar-wrap{flex:1;display:flex;align-items:center;gap:10px}
    .subj-track{flex:1;height:6px;background:var(--gray-100);border-radius:9999px;overflow:hidden}
    .subj-fill{height:100%;border-radius:9999px;transition:width 1s ease}
    .fill-g{background:linear-gradient(90deg,#18A34A,#4ade80)}
    .fill-a{background:linear-gradient(90deg,#D97706,#fbbf24)}
    .fill-r{background:linear-gradient(90deg,#DC2626,#f87171)}
    .subj-pct{font-size:13px;font-weight:700;width:40px;text-align:right}
    .pc-g{color:var(--green)}.pc-a{color:var(--amber)}.pc-r{color:var(--red)}

    /* QUESTION REVIEW */
    .review-toggle-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:var(--r-sm);font-size:14px;font-weight:600;background:var(--white);border:1.5px solid var(--border);color:var(--navy);cursor:pointer;transition:all .15s;margin-bottom:16px}
    .review-toggle-btn:hover{border-color:var(--navy)}
    .review-item{padding:18px 20px;border-bottom:1px solid var(--border)}
    .review-item:last-child{border-bottom:none}
    .review-q-num{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
    .review-q-text{font-size:14px;color:var(--navy);line-height:1.6;margin-bottom:12px;font-weight:500}
    .review-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    .rev-opt{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--r-sm);font-size:13px}
    .rev-opt.correct{background:var(--green-pale);color:var(--green)}
    .rev-opt.wrong{background:var(--red-pale);color:var(--red)}
    .rev-opt.neutral{color:var(--gray-600)}
    .rev-key{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
    .rev-opt.correct .rev-key{background:var(--green);color:#fff}
    .rev-opt.wrong .rev-key{background:var(--red);color:#fff}
    .rev-opt.neutral .rev-key{background:var(--gray-100);color:var(--gray-600)}
    .review-expl{font-size:12px;color:var(--gray-600);background:var(--gray-50);border-radius:var(--r-sm);padding:10px 13px;line-height:1.65;border-left:3px solid var(--green)}

    .no-results{text-align:center;padding:60px 20px;color:var(--gray-400)}
    .no-results a{color:var(--navy);font-weight:600}
  </style>
  <script src="/js/api.js"></script>
</head>

<script>
const CIRCUMFERENCE = 471.2; // 2 * PI * 75

const urlParams = new URLSearchParams(window.location.search);
const mode = urlParams.get('mode') || 'flash-cbt';

(async () => {
  try {
    const data = await PX.get('/auth/me');
    if (data && data.user) {
      const u = data.user;
      const initials = ((u.firstName||'')[0]+(u.lastName||'')[0]).toUpperCase()||'--';
      document.querySelectorAll('.sb-av,#sbAv,#topAv').forEach(el => el.textContent = initials);
      document.getElementById('sbUname').textContent = (u.firstName+' '+u.lastName).trim();
      document.getElementById('sbRole').textContent = (u.examFocus==='oau'?'OAU':'UNILAG')+' Post-UTME · 2026';
    }
  } catch(e) {}

  await loadResults();
})();

async function loadResults() {
  // Try API first — it has authoritative scores
  try {
    const sessData = await PX.get('/sessions?limit=1');
    if (sessData && sessData.sessions && sessData.sessions.length > 0) {
      const s = sessData.sessions[0];
      // Only use API data if it was completed recently (within last 10 minutes)
      const completedAt = new Date(s.completedAt).getTime();
      const isRecent = (Date.now() - completedAt) < 10 * 60 * 1000;
      if (isRecent && s.score > 0) {
        // Build subject breakdown from session answers + question data
        let subjectBreakdown = {};
        const sessionAnswers = s.answers || {};
        const questionIds = Object.keys(sessionAnswers);

        // Try to get question subjects from stored questions first
        let storedQuestions = [];
        let storedAnswers = {};
        try {
          const raw = sessionStorage.getItem('px_last_result');
          if (raw) {
            const stored = JSON.parse(raw);
            storedQuestions = stored.questions || [];
            storedAnswers = stored.answers || {};
          }
        } catch(e) {}

        // Build subject breakdown from stored questions
        if (storedQuestions.length > 0) {
          storedQuestions.forEach(q => {
            const subj = q.subject || 'Mixed';
            if (!subjectBreakdown[subj]) subjectBreakdown[subj] = { correct: 0, total: 0 };
            subjectBreakdown[subj].total++;
            const ans = sessionAnswers[q.id];
            if (ans && ans.isCorrect) subjectBreakdown[subj].correct++;
          });
        }

        renderResults({
          mode: s.mode,
          category: s.category,
          score: s.score,
          correctAnswers: s.correctAnswers,
          totalQuestions: s.totalQuestions,
          wrongAnswers: s.totalQuestions - s.correctAnswers,
          timeTaken: s.timeTaken,
          subjectBreakdown,
          year: s.topic ? parseInt(s.topic) : null,
          cutoff: null,
          questions: storedQuestions,
          answers: sessionAnswers,
        });
        return;
      }
    }
  } catch(e) {
    console.error('API fetch error:', e);
  }

  // Fallback to sessionStorage
  const raw = sessionStorage.getItem('px_last_result');
  if (!raw) {
    document.getElementById('pageContent').innerHTML = `
      <div class="no-results">
        <p style="font-size:16px;font-weight:600;color:var(--navy);margin-bottom:8px">No results found</p>
        <p style="margin-bottom:20px">Complete an exam to see your results here.</p>
        <a href="flash-cbt.html" class="act-btn primary" style="display:inline-block">Start Flash CBT</a>
      </div>`;
    return;
  }

  try {
    const results = JSON.parse(raw);
    renderResults(results);
  } catch(e) {
    document.getElementById('pageContent').innerHTML = '<div class="no-results">Failed to load results. Please try again.</div>';
  }
}

function renderResults(R) {
  window._lastResults = R; // Store globally for answer review
  const score = R.score || 0;
  const correct = R.correctAnswers || 0;
  const total = R.totalQuestions || 0;
  const wrong = total - correct;
  const timeTaken = R.timeTaken || 0;
  const mins = Math.floor(timeTaken / 60);
  const secs = timeTaken % 60;
  const timeStr = mins > 0 ? mins+'m '+secs+'s' : secs+'s';
  const ringColor = score >= 60 ? '#18A34A' : score >= 40 ? '#D97706' : '#DC2626';
  const offset = CIRCUMFERENCE * (1 - score / 100);

  let grade, gradeClass, title, subtitle;
  if (score >= 80) {
    grade = 'Excellent'; gradeClass = 'grade-excellent';
    title = 'Excellent performance.';
    subtitle = 'You are very well prepared. Keep this up and you will excel in the real exam.';
  } else if (score >= 60) {
    grade = 'Good'; gradeClass = 'grade-good';
    title = 'Good performance.';
    subtitle = 'Solid work. Review a few weak areas and you will be ready.';
  } else if (score >= 40) {
    grade = 'Average'; gradeClass = 'grade-average';
    title = 'Average performance.';
    subtitle = 'You are making progress. Focus on weaker subjects using Topic Drill before the exam.';
  } else {
    grade = 'Needs Work'; gradeClass = 'grade-needs-work';
    title = 'Needs improvement.';
    subtitle = 'Do not be discouraged. Use Topic Drill to target your weak areas and try again.';
  }

  // Subject breakdown from engine results
  const subjectBreakdown = R.subjectBreakdown || {};
  const subjectRows = Object.entries(subjectBreakdown).map(([subj, data]) => {
    const pct = data.total > 0 ? Math.round((data.correct / data.total) * 100) : 0;
    const fillClass = pct >= 60 ? 'fill-g' : pct >= 40 ? 'fill-a' : 'fill-r';
    const pctClass = pct >= 60 ? 'pc-g' : pct >= 40 ? 'pc-a' : 'pc-r';
    return `<div class="subj-row">
      <div class="subj-name">${subj}</div>
      <div class="subj-bar-wrap">
        <div class="subj-track"><div class="subj-fill ${fillClass}" data-w="${pct}%" style="width:0"></div></div>
        <div class="subj-pct ${pctClass}">${pct}%</div>
      </div>
    </div>`;
  }).join('');

  // Cut-off banner for year vault
  let cutoffBanner = '';
  if (R.mode === 'year-vault' && R.cutoff && R.year) {
    const passed = score >= R.cutoff;
    const gap = Math.abs(score - R.cutoff);
    cutoffBanner = `<div class="cutoff-banner ${passed?'pass':'fail'}">
      <div class="cutoff-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          ${passed
            ? '<path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>'
            : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>'}
        </svg>
      </div>
      <div class="cutoff-text">
        ${passed
          ? `You scored <strong>${score}%</strong> — The ${R.year} cut-off was <strong>${R.cutoff}%</strong>. You would have qualified.`
          : `You scored <strong>${score}%</strong> — The ${R.year} cut-off was <strong>${R.cutoff}%</strong>. You needed <strong>${gap}% more</strong>.`}
      </div>
    </div>`;
  }

  const retryHref = R.mode === 'year-vault' ? 'year-vault.html' : R.mode === 'topic-drill' ? 'topic-drill.html' : 'flash-cbt.html';
  const pts = Math.max(10, Math.round(score * 1.5));

  document.getElementById('pageContent').innerHTML = `
    <div class="score-hero">
      <div class="score-ring-wrap">
        <svg class="score-ring-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="score-ring-track" cx="80" cy="80" r="68"/>
          <circle class="score-ring-fill" cx="80" cy="80" r="68"
            stroke="${ringColor}"
            stroke-dasharray="${CIRCUMFERENCE}"
            stroke-dashoffset="${CIRCUMFERENCE}" id="scoreRingFill"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-pct">${score}%</div>
          <div class="score-pct-lbl">Score</div>
        </div>
      </div>
      <h1 class="score-title">${title}</h1>
      <p class="score-subtitle">${subtitle}</p>
      <span class="grade-badge ${gradeClass}">${grade}</span>
    </div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${correct}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${wrong}</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Total Questions</div></div>
      <div class="stat-box"><div class="stat-num">${timeStr}</div><div class="stat-lbl">Time Taken</div></div>
    </div>

    ${cutoffBanner}

    <div class="pts-earned">
      <div class="pts-ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg></div>
      <div><div class="pts-num">+${pts} pts</div><div class="pts-lbl">Points earned this session</div></div>
    </div>

    <div class="actions">
      <button class="act-btn primary" onclick="window.location.href='dashboard.html'">Back to Dashboard</button>
      <button class="act-btn secondary" onclick="window.location.href='${retryHref}'">Try Again</button>
      <button class="act-btn gold" onclick="window.location.href='performance.html'">View Performance</button>
    </div>

    ${subjectRows ? `<div class="panel"><div class="ph"><div class="ph-ttl">Subject Breakdown</div></div>${subjectRows}</div>` : ''}

    ${R.questions && R.questions.length > 0 ? `
      <button class="review-toggle-btn" id="reviewToggleBtn" onclick="toggleReview()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
        Show Answer Review
      </button>
      <div class="panel" id="reviewPanel" style="display:none">
        <div class="ph"><div class="ph-ttl">Answer Review</div></div>
        <div id="reviewList"></div>
      </div>` : ''}`;

  // Animate ring
  setTimeout(() => {
    const fill = document.getElementById('scoreRingFill');
    if (fill) fill.style.strokeDashoffset = offset;
  }, 300);

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('[data-w]').forEach(b => b.style.width = b.dataset.w);
  }, 500);
}

let reviewShown = false;
function toggleReview() {
  reviewShown = !reviewShown;
  const panel = document.getElementById('reviewPanel');
  const btn = document.getElementById('reviewToggleBtn');
  if (panel) panel.style.display = reviewShown ? 'block' : 'none';
  if (btn) {
    btn.innerHTML = reviewShown
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"/></svg> Hide Answer Review`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg> Show Answer Review`;
  }
  if (reviewShown) buildReview();
}

function buildReview() {
  const list = document.getElementById('reviewList');
  if (!list) return;

  // Use global results object if available, fallback to sessionStorage
  let R = window._lastResults;
  if (!R) {
    const raw = sessionStorage.getItem('px_last_result');
    if (!raw) return;
    try { R = JSON.parse(raw); } catch(e) { return; }
  }

  if (!R.questions || R.questions.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">Question details not available for this session.</div>';
    return;
  }

  R.questions.slice(0, 40).forEach((q, i) => {
    const answerData = R.answers ? R.answers[i] : null;
    const selected = answerData ? answerData.selected : null;
    const correct = q.answer || (answerData ? answerData.correct : null);

    const div = document.createElement('div');
    div.className = 'review-item';

    const opts = ['A','B','C','D'].map(key => {
      let cls = 'neutral';
      if (key === correct) cls = 'correct';
      else if (key === selected && key !== correct) cls = 'wrong';
      return `<div class="rev-opt ${cls}"><div class="rev-key">${key}</div><div>${q['option'+key]||''}</div></div>`;
    }).join('');

    div.innerHTML = `
      <div class="review-q-num">Question ${i+1}${q.subject?' — '+q.subject:''}</div>
      <div class="review-q-text">${q.question}</div>
      <div class="review-opts">${opts}</div>
      ${q.explanation ? `<div class="review-expl">${q.explanation}</div>` : ''}`;
    list.appendChild(div);
  });
}

const sb=document.getElementById('sidebar'),ov=document.getElementById('sbOv'),ham=document.getElementById('hamBtn');
function closeSidebar(){sb.classList.remove('open');ov.classList.remove('show');ham.setAttribute('aria-expanded','false');document.body.style.overflow='';}
function openSidebar(){sb.classList.add('open');ov.classList.add('show');ham.setAttribute('aria-expanded','true');document.body.style.overflow='hidden';}
ham.addEventListener('click',()=>sb.classList.contains('open')?closeSidebar():openSidebar());
ov.addEventListener('click',closeSidebar);
</script>
</body>
