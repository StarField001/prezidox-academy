<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — Prezidox Academy</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#0B1F3A;--navy-mid:#132c52;--navy-light:#1e3f6e;--charcoal:#1C1C1E;
      --gold:#E5A100;--gold-bright:#F5B800;--gold-deep:#C48900;--gold-pale:#FFF8E6;
      --white:#fff;--off-white:#F9F8F5;--gray-50:#F5F4F1;--gray-100:#ECEAE5;
      --gray-200:#D8D5CE;--gray-400:#9B9790;--gray-600:#5C5854;--gray-800:#2E2C29;
      --border:#E4E1DC;--green:#18A34A;--green-pale:#F0FDF4;--red:#DC2626;--amber:#D97706;
      --sidebar-w:252px;--topbar-h:62px;
      --font-display:'DM Serif Display',Georgia,serif;
      --font-body:'Inter',system-ui,sans-serif;
      --shadow-sm:0 2px 8px rgba(11,31,58,.08);
      --shadow-md:0 4px 20px rgba(11,31,58,.10);
      --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--r-full:9999px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font-body);background:var(--off-white);color:var(--gray-800);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    button{cursor:pointer;font-family:var(--font-body);border:none;background:none}
    svg{display:block}

    /* SIDEBAR */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:100;background:var(--navy);display:flex;flex-direction:column;transition:transform .28s cubic-bezier(.4,0,.2,1)}
    @media(max-width:960px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none;flex-shrink:0}
    .sb-logo-mark{width:30px;height:30px;border-radius:7px;flex-shrink:0}
    .sb-logo-name{font-family:var(--font-display);font-size:16px;color:#fff}
    .sb-logo-sub{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);display:block}
    .sb-nav{flex:1;overflow-y:auto;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
    .sb-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.24);padding:12px 10px 4px;margin-top:4px}
    .sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:rgba(255,255,255,.56);transition:all .15s;position:relative}
    .sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .sb-item.active{background:rgba(229,161,0,.12);color:var(--gold-bright)}
    .sb-item.active::before{content:'';position:absolute;left:0;top:5px;bottom:5px;width:3px;border-radius:0 2px 2px 0;background:var(--gold)}
    .sb-ic{width:17px;flex-shrink:0;display:flex;align-items:center}
    .sb-user{padding:11px 13px;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:9px;flex-shrink:0}
    .sb-av{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
    .sb-uname{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-urole{font-size:10px;color:rgba(255,255,255,.32)}
    .sb-logout{margin-left:auto;color:rgba(255,255,255,.26);transition:color .15s;flex-shrink:0}
    .sb-logout:hover{color:#fff}

    /* MAIN */
    .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
    @media(max-width:960px){.main{margin-left:0}}
    .topbar{position:sticky;top:0;z-index:50;height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 clamp(14px,3vw,26px);gap:12px;box-shadow:0 1px 4px rgba(11,31,58,.06)}
    .topbar-ham{display:none;flex-direction:column;gap:4px;padding:4px;flex-shrink:0}
    @media(max-width:960px){.topbar-ham{display:flex}}
    .topbar-ham span{display:block;width:19px;height:1.8px;background:var(--navy);border-radius:2px}
    .topbar-ttl{font-family:var(--font-display);font-size:17px;color:var(--navy)}
    .topbar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
    .topbar-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold-deep),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;text-decoration:none}
    .page{padding:clamp(16px,3vw,26px);flex:1;max-width:720px}

    /* PAGE HEADER */
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
    .page-title{font-family:var(--font-display);font-size:clamp(20px,3vw,26px);color:var(--navy)}
    .page-actions{display:flex;gap:8px}
    .mark-all-btn{padding:8px 16px;border-radius:var(--r-sm);background:var(--navy);color:#fff;font-size:12px;font-weight:600;transition:background .15s}
    .mark-all-btn:hover{background:var(--navy-mid)}
    .unread-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 6px;border-radius:var(--r-full);background:var(--red);color:#fff;font-size:11px;font-weight:700;margin-left:8px}

    /* FILTER TABS */
    .filter-tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
    .filter-tab{padding:7px 16px;border-radius:var(--r-full);border:1.5px solid var(--border);font-size:12px;font-weight:600;color:var(--gray-600);cursor:pointer;transition:all .15s;background:#fff}
    .filter-tab:hover{border-color:var(--navy);color:var(--navy)}
    .filter-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}

    /* NOTIFICATION LIST */
    .notif-list{background:#fff;border:1.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
    .notif-row{display:flex;align-items:flex-start;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);transition:background .15s;position:relative;cursor:pointer}
    .notif-row:last-child{border-bottom:none}
    .notif-row:hover{background:var(--gray-50)}
    .notif-row.unread{background:rgba(11,31,58,.02)}
    .notif-row.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--navy)}
    .notif-icon{width:40px;height:40px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .notif-icon.welcome{background:var(--gold-pale);color:var(--gold-deep)}
    .notif-icon.rank{background:var(--gold-pale);color:var(--gold-deep)}
    .notif-icon.battle{background:rgba(220,38,38,.08);color:var(--red)}
    .notif-icon.streak{background:rgba(217,119,6,.08);color:var(--amber)}
    .notif-icon.study_hall{background:var(--green-pale);color:var(--green)}
    .notif-icon.general{background:var(--gray-100);color:var(--gray-600)}
    .notif-icon.trial{background:rgba(124,58,237,.08);color:#7c3aed}
    .notif-icon.subscription{background:var(--green-pale);color:var(--green)}
    .notif-body{flex:1;min-width:0}
    .notif-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;line-height:1.4}
    .notif-text{font-size:12px;color:var(--gray-600);line-height:1.5;margin-bottom:6px}
    .notif-footer{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .notif-time{font-size:11px;color:var(--gray-400)}
    .notif-cta{font-size:11px;font-weight:600;color:var(--gold-deep);transition:color .15s}
    .notif-cta:hover{color:var(--gold)}
    .notif-unread-dot{width:8px;height:8px;border-radius:50%;background:var(--navy);flex-shrink:0;margin-top:4px}

    /* EMPTY STATE */
    .notif-empty{padding:48px 20px;text-align:center}
    .notif-empty-icon{width:56px;height:56px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--gray-400)}
    .notif-empty-title{font-family:var(--font-display);font-size:18px;color:var(--navy);margin-bottom:6px}
    .notif-empty-sub{font-size:13px;color:var(--gray-400);line-height:1.6}

    /* SKELETON */
    .skel{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-50) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    :focus-visible{outline:2.5px solid var(--gold);outline-offset:2px;border-radius:4px}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}

    /* OVERLAYS */
    .sb-ov{display:none;position:fixed;inset:0;background:rgba(11,31,58,.5);z-index:99;backdrop-filter:blur(2px)}
    .sb-ov.show{display:block}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);z-index:500;background:var(--charcoal);color:#fff;padding:12px 22px;border-radius:var(--r-md);font-size:13px;font-weight:500;box-shadow:0 8px 40px rgba(11,31,58,.13);transition:transform .3s ease,opacity .3s ease;opacity:0;pointer-events:none;max-width:380px;text-align:center}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  </style>
  <script src="/js/api.js"></script>
</head>

<script>
/* ═══ AUTH ═══ */
(async () => {
  try {
    const res = await fetch('/api/auth/me', { credentials:'include' });
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const { user } = await res.json();
    if (!user.profileComplete) { window.location.href = '/profile-setup.html'; return; }
    window.PX_USER = user;
    const initials = ((user.firstName||'')[0]+(user.lastName||'')[0]).toUpperCase();
    document.querySelectorAll('#sbAv,#topAv').forEach(el => el.textContent = initials);
    document.getElementById('sbUname').textContent = `${user.firstName} ${user.lastName}`.trim();
    document.getElementById('sbRole').textContent = (user.examFocus === 'oau' ? 'OAU' : 'UNILAG') + ' Post-UTME · 2026';
  } catch(e) { window.location.href = '/login.html'; }
})();

/* ═══ STATE ═══ */
let allNotifs = [];
let currentFilter = 'all';
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeUrl(u){ u = String(u||'').trim(); return /^(javascript|data|vbscript):/i.test(u) ? '#' : u; }

/* ═══ ICONS BY TYPE ═══ */

/* ═══ TIME AGO ═══ */
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if (days < 7) return `${days}d ago`;
  return new Date(dateStr).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

/* ═══ LOAD ═══ */
async function loadNotifications() {
  try {
    const res = await fetch('/api/notifications?limit=50', { credentials:'include' });
    if (!res.ok) throw new Error();
    const d = await res.json();
    allNotifs = d.notifications || [];
    updateUnreadBadge(d.unreadCount || 0);
    renderList();
  } catch(e) {
    document.getElementById('notifList').innerHTML = '<div class="notif-empty"><div class="notif-empty-title">Could not load notifications</div><div class="notif-empty-sub">Please refresh the page.</div></div>';
  }
}

function updateUnreadBadge(count) {
  const badge = document.getElementById('unreadBadge');
  if (count > 0) { badge.textContent = count; badge.style.display = 'inline-flex'; }
  else { badge.style.display = 'none'; }
}

/* ═══ FILTER ═══ */
function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function getFiltered() {
  if (currentFilter === 'all') return allNotifs;
  if (currentFilter === 'unread') return allNotifs.filter(n => !n.read);
  return allNotifs.filter(n => n.type === currentFilter);
}

/* ═══ RENDER ═══ */
function renderList() {
  const list = document.getElementById('notifList');
  const filtered = getFiltered();

  if (!filtered.length) {
    list.innerHTML = `
      <div class="notif-empty">
        <div class="notif-empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg></div>
        <div class="notif-empty-title">No notifications</div>
        <div class="notif-empty-sub">${currentFilter === 'unread' ? 'You are all caught up.' : 'Notifications will appear here as you use the platform.'}</div>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(n => {
    const iconType = TYPE_ICONS[n.type] ? n.type : 'general';
    const icon = TYPE_ICONS[iconType] || TYPE_ICONS.general;
    return `
      <div class="notif-row ${!n.read ? 'unread' : ''}" data-id="${esc(n.id)}" role="button" tabindex="0">
        <div class="notif-icon ${iconType}">${icon}</div>
        <div class="notif-body">
          <div class="notif-title">${esc(n.title)}</div>
          <div class="notif-text">${esc(n.body)}</div>
          <div class="notif-footer">
            <span class="notif-time">${esc(timeAgo(n.createdAt))}</span>
            ${n.ctaText && n.ctaUrl ? `<a class="notif-cta" href="${esc(safeUrl(n.ctaUrl))}" data-cta>${esc(n.ctaText)} &rarr;</a>` : ''}
          </div>
        </div>
        ${!n.read ? '<div class="notif-unread-dot"></div>' : ''}
      </div>`;
  }).join('');
}

/* ═══ MARK READ (event delegation; keyboard-accessible rows) ═══ */
document.getElementById('notifList').addEventListener('click', e => {
  if (e.target.closest('[data-cta]')) { e.stopPropagation(); return; }
  const row = e.target.closest('.notif-row');
  if (row) markRead(row.dataset.id, row);
});
document.getElementById('notifList').addEventListener('keydown', e => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const row = e.target.closest('.notif-row');
  if (row && !e.target.closest('[data-cta]')) { e.preventDefault(); markRead(row.dataset.id, row); }
});
async function markRead(id, row) {
  const notif = allNotifs.find(n => n.id === id);
  if (!notif || notif.read) return;
  notif.read = true;
  row.classList.remove('unread');
  const dot = row.querySelector('.notif-unread-dot');
  if (dot) dot.remove();
  const unread = allNotifs.filter(n => !n.read).length;
  updateUnreadBadge(unread);
  try {
    await fetch(`/api/notifications/${id}/read`, { method:'POST', credentials:'include' });
  } catch(e) {}
}

async function markAllRead() {
  allNotifs.forEach(n => n.read = true);
  updateUnreadBadge(0);
  renderList();
  try {
    await fetch('/api/notifications/read-all', { method:'POST', credentials:'include' });
    showToast('All notifications marked as read.');
  } catch(e) {}
}

/* ═══ SIDEBAR ═══ */
const sb = document.getElementById('sidebar');
const ov = document.getElementById('sbOv');
const ham = document.getElementById('hamBtn');
function openSidebar(){sb.classList.add('open');ov.classList.add('show');ham.setAttribute('aria-expanded','true');document.body.style.overflow='hidden';}
function closeSidebar(){sb.classList.remove('open');ov.classList.remove('show');ham.setAttribute('aria-expanded','false');document.body.style.overflow='';}
ham.addEventListener('click',()=>sb.classList.contains('open')?closeSidebar():openSidebar());
ov.addEventListener('click',closeSidebar);
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&sb.classList.contains('open'))closeSidebar();});

document.getElementById('logoutBtn').addEventListener('click', async e => {
  e.preventDefault();
  if (!confirm('Are you sure you want to log out?')) return;
  try { await fetch('/api/auth/logout', { method:'POST', credentials:'include' }); } catch(err) {}
  window.location.href = '/login.html';
});

/* ═══ TOAST ═══ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 3500);
}

/* ═══ INIT ═══ */
window.addEventListener('DOMContentLoaded', loadNotifications);
</script>
